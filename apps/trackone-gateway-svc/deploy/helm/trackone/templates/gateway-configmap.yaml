{{- if and .Values.gateway.enabled (not .Values.gateway.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trackone.gatewayConfigMapName" . }}
  namespace: {{ include "trackone.namespace" . }}
  labels:
    app.kubernetes.io/name: trackone-gateway
    {{ include "trackone.commonLabels" . | nindent 4 }}
data:
  OTS_CALENDARS: {{ .Values.gateway.env.otsCalendars | quote }}
  TRACKONE_LEDGER_ID: {{ .Values.gateway.env.ledgerId | quote }}
  TRACKONE_SITE_ID: {{ .Values.gateway.env.siteId | quote }}
  TRACKONE_INTERVAL_MS: {{ .Values.gateway.env.intervalMs | quote }}
  TRACKONE_BATCH_RECORD_LIMIT: {{ .Values.gateway.env.batchRecordLimit | quote }}
  TRACKONE_EMPTY_MODE: {{ .Values.gateway.env.emptyMode | quote }}
  TRACKONE_TSA_URL: {{ .Values.gateway.env.tsaUrl | quote }}
  TRACKONE_TSA_POLICY_OID: {{ .Values.gateway.env.tsaPolicyOid | quote }}
  TRACKONE_TSA_SIGNER_CERT_SHA256: {{ required "gateway.env.tsaSignerCertSha256 is required when the gateway is enabled" .Values.gateway.env.tsaSignerCertSha256 | quote }}
{{- end }}
