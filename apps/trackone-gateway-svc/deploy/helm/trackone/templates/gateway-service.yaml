{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: trackone-gateway
  namespace: {{ include "trackone.namespace" . }}
  labels:
    app.kubernetes.io/name: trackone-gateway
    {{ include "trackone.commonLabels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: trackone-gateway
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: http
      {{- if and (eq .Values.gateway.service.type "NodePort") .Values.gateway.service.nodePort }}
      nodePort: {{ .Values.gateway.service.nodePort }}
      {{- end }}
  type: {{ .Values.gateway.service.type }}
{{- end }}
