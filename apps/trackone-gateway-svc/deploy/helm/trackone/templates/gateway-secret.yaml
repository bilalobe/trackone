{{- if and .Values.gateway.enabled (not .Values.gateway.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trackone.gatewaySecretName" . }}
  namespace: {{ include "trackone.namespace" . }}
  labels:
    app.kubernetes.io/name: trackone-gateway
    {{ include "trackone.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.gateway.env.databaseUrl | quote }}
  TRACKONE_DATABASE_URL: {{ .Values.gateway.env.databaseUrl | quote }}
  tsa-ca.pem: {{ required "gateway.env.tsaCaPem is required when the gateway is enabled" .Values.gateway.env.tsaCaPem | quote }}
  tsa-crls.pem: {{ required "gateway.env.tsaCrlsPem is required when the gateway is enabled" .Values.gateway.env.tsaCrlsPem | quote }}
  {{- if .Values.gateway.env.tsaIntermediatesPem }}
  tsa-intermediates.pem: {{ .Values.gateway.env.tsaIntermediatesPem | quote }}
  {{- end }}
{{- end }}
