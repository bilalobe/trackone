[package]
name = "trackone-pod-fw"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

[dependencies]
trackone-core = { path = "../trackone-core", default-features = false }

[dev-dependencies]
trackone-core = { path = "../trackone-core", default-features = false, features = ["dummy-aead"] }

[features]
default = ["std"]
std = []
mock = []
mock-log = ["mock", "std"]

# Future: when targeting embedded platforms
# [profile.release]
# lto = true
# codegen-units = 1
# opt-level = "z"
# panic = "abort"
# overflow-checks = false
