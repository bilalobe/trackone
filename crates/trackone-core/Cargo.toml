[package]
name = "trackone-core"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true
repository = "https://github.com/bilalobe/trackone"

[features]
# Default to std for host/gateway development and testing.
# Downstream crates (e.g., pod firmware) should disable default features
# to build in true no_std mode.
default = ["std", "dummy-aead"]

# Enable use of the Rust standard library.
std = []

# Gateway-only helpers (e.g., Merkle tree) that require the Rust standard library (`std`)
# and are not compatible with `no_std + alloc` environments. The merkle module uses `Vec::with_capacity`
# and `to_vec()` which require full `std` support. This feature is not intended for very small MCUs
# or embedded systems without full `std` support.
# Currently this pulls in sha2 and requires std. We keep it as a separate feature so gateway crates
# can opt in explicitly.
gateway = ["sha2", "std"]

# Enable the built-in dummy AEAD implementation used for tests and
# examples. Downstream users targeting production firmware should
# disable this feature.
dummy-aead = []

[dependencies]
# Core data-structure support for no_std environments.
heapless = { version = "0.9", default-features = false, features = ["serde"] }

# Serialization support; postcard itself is no_std-capable, but we
# keep features minimal for now. We can refine features as needed
# once concrete formats are stabilized.
postcard = { version = "1", default-features = false }

# Serde for (de)serializing core types.
serde = { version = "1", default-features = false, features = ["derive"] }

# Hashing for Merkle trees and other gateway-only uses.
sha2 = { version = "0.10", default-features = false, optional = true }

# Zeroize secret key material on drop.
zeroize = { version = "1", default-features = false, features = ["derive"] }

# Workspace constants dependency
trackone-constants = { path = "../trackone-constants" }

[dev-dependencies]
# No special dev-dependencies yet; tests rely on the same core crates.

[lib]
# Keep doctests disabled for now until public API and examples stabilize.
doctest = false
