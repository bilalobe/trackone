[package]
name = "trackone-gateway"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

[lib]
name = "trackone"
crate-type = ["cdylib"]
doctest = false

[dependencies]
trackone-core = { path = "../trackone-core" }
pyo3.workspace = true

[dev-dependencies]

[profile.release]
lto = true
codegen-units = 1
opt-level = "z"
strip = true
panic = "abort"
