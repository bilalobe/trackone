[package]
name = "trackone-gateway"
description = "Gateway-side Rust crate exposing PyO3 bindings for Python"
version.workspace = true
edition.workspace = true
publish = true
license.workspace = true
authors.workspace = true
repository.workspace = true
readme = "README.md"

[lib]
name = "trackone"
crate-type = ["cdylib", "rlib"]
doctest = false

[dependencies]
trackone-core = { version = "0.1.0-alpha.3", path = "../trackone-core", default-features = false, features = ["gateway"] }
trackone-ledger = { version = "0.1.0-alpha.3", path = "../trackone-ledger" }
pyo3.workspace = true

[dev-dependencies]
