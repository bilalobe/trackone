{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trackone-gateway
  namespace: {{ include "trackone.namespace" . }}
  labels:
    app.kubernetes.io/name: trackone-gateway
    {{ include "trackone.commonLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trackone-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trackone-gateway
        {{ include "trackone.commonLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "trackone.image" .Values.gateway.image }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "trackone.gatewayConfigMapName" . }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "trackone.gatewaySecretName" . }}
                  key: DATABASE_URL
          ports:
            - name: http
              containerPort: {{ .Values.gateway.service.port }}
          readinessProbe:
            httpGet:
              path: {{ .Values.gateway.probes.readinessPath }}
              port: http
            initialDelaySeconds: {{ .Values.gateway.probes.readinessInitialDelay }}
            periodSeconds: {{ .Values.gateway.probes.readinessPeriod }}
          livenessProbe:
            httpGet:
              path: {{ .Values.gateway.probes.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.gateway.probes.livenessInitialDelay }}
            periodSeconds: {{ .Values.gateway.probes.livenessPeriod }}
          resources:
            {{ toYaml .Values.gateway.resources | nindent 12 }}
{{- end }}
