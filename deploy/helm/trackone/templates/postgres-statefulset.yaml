{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ include "trackone.namespace" . }}
  labels:
    app.kubernetes.io/name: postgres
    {{- include "trackone.commonLabels" . | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        {{- include "trackone.commonLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: pg
              containerPort: {{ .Values.postgres.service.port }}
          envFrom:
            - secretRef:
                name: postgres-auth
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          {{- if .Values.postgres.persistence.enabled }}
          persistentVolumeClaim:
            claimName: pgdata
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
