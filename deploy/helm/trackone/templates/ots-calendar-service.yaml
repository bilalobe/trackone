{{- if .Values.otsCalendar.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ots-calendar
  namespace: {{ include "trackone.namespace" . }}
  labels:
    app.kubernetes.io/name: ots-calendar
    {{- include "trackone.commonLabels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: ots-calendar
  ports:
    - name: http
      port: {{ .Values.otsCalendar.port }}
      targetPort: http
  type: ClusterIP
{{- end }}
