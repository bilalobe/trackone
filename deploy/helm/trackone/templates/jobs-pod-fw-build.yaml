{{- if and .Values.jobs.enabled .Values.jobs.podFw.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: trackone-pod-fw-build
  namespace: {{ include "trackone.namespace" . }}
  labels:
    app.kubernetes.io/name: trackone-pod-fw-build
    {{- include "trackone.commonLabels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trackone-pod-fw-build
        {{- include "trackone.commonLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: pod-fw-build
          image: {{ .Values.jobs.podFw.image.repository }}:{{ .Values.jobs.podFw.image.tag }}
          imagePullPolicy: {{ .Values.jobs.podFw.image.pullPolicy }}
{{- end }}
