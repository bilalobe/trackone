# Published-artifact overlay.
#
# The base chart now defaults to the published deployment model. Use this file
# when you want an additional overlay for private GHCR pulls or to pin digests
# without repeating the rest of the chart values.
# Runtime config and credentials still come from the chart-managed
# ConfigMap/Secret objects.
#
# Optional:
# gateway:
#   existingConfigMap: shared-trackone-gateway-config
#   existingSecret: shared-trackone-gateway-env
# postgres:
#   auth:
#     existingSecret: shared-postgres-auth

postgres:
  auth:
    existingSecret: shared-postgres-auth

imagePullSecrets:
  # GHCR package images are often private; create this secret in the namespace:
  #   kubectl -n trackone create secret docker-registry ghcr-creds \
  #     --docker-server=ghcr.io \
  #     --docker-username=<USER> \
  #     --docker-password=<TOKEN> \
  #     --docker-email=<EMAIL>
  - name: ghcr-creds

# Optional: override to digest pins instead of the release tags in values.yaml.
# gateway:
#   image:
#     digest: sha256:<...>
# otsCalendar:
#   image:
#     digest: sha256:<...>
