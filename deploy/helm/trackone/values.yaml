namespace:
  create: true
  name: trackone

otsCalendar:
  enabled: true
  image:
    repository: ots/calendar
    tag: latest
    pullPolicy: IfNotPresent
  port: 8468
  logLevel: info
  persistence:
    enabled: false
    size: 1Gi

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    database: trackone
    username: trackone
    password: trackone
  service:
    port: 5432
  persistence:
    enabled: false
    size: 5Gi

gateway:
  enabled: true
  image:
    repository: trackone/gateway
    tag: local
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    nodePort: 30080
  env:
    otsCalendars: http://ots-calendar:8468
    databaseUrl: postgresql://trackone:trackone@postgres:5432/trackone
  probes:
    readinessPath: /health
    livenessPath: /health
    readinessInitialDelay: 2
    readinessPeriod: 5
    livenessInitialDelay: 10
    livenessPeriod: 10

jobs:
  enabled: true
  backoffLimit: 0
  core:
    enabled: true
    image:
      repository: trackone/core
      tag: local
      pullPolicy: Never
    features: "std,gateway"
    noDefaultFeatures: "0"
  constants:
    enabled: true
    image:
      repository: trackone/constants
      tag: local
      pullPolicy: Never
  podFw:
    enabled: true
    image:
      repository: trackone/pod-fw
      tag: local
      pullPolicy: Never
