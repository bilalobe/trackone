namespace:
  create: true
  name: trackone

otsCalendar:
  enabled: true
  image:
    repository: ots/calendar
    tag: 0.1.0
    pullPolicy: IfNotPresent
  port: 8468
  logLevel: info
  persistence:
    enabled: false
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 512Mi

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    database: trackone
    username: trackone
    password: trackone
  service:
    port: 5432
  persistence:
    enabled: false
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 1Gi

gateway:
  enabled: true
  image:
    repository: trackone/gateway
    tag: local
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    nodePort: 30080
  env:
    otsCalendars: http://ots-calendar:8468
    databaseUrl: postgresql://trackone:trackone@postgres:5432/trackone
  probes:
    readinessPath: /health
    livenessPath: /health
    readinessInitialDelay: 2
    readinessPeriod: 5
    livenessInitialDelay: 10
    livenessPeriod: 10
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 512Mi

jobs:
  enabled: true
  backoffLimit: 0
  core:
    enabled: true
    image:
      repository: trackone/core
      tag: local
      pullPolicy: Never
    features: "std,gateway"
    noDefaultFeatures: "0"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 1Gi
  constants:
    enabled: true
    image:
      repository: trackone/constants
      tag: local
      pullPolicy: Never
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 1Gi
  podFw:
    enabled: true
    image:
      repository: trackone/pod-fw
      tag: local
      pullPolicy: Never
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 1Gi
