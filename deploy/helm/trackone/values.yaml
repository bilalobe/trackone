namespace:
  create: true
  name: trackone

# Optional image pull secrets for private registries (e.g. GHCR).
# Example:
# imagePullSecrets:
#   - name: ghcr-creds
imagePullSecrets: []

otsCalendar:
  enabled: true
  image:
    repository: ghcr.io/bilalobe/trackone/ots-calendar
    tag: 0.1.0-alpha.10
    pullPolicy: IfNotPresent
  port: 8468
  logLevel: info
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 512Mi

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    # If set, the chart will not create postgres-auth and will instead
    # reference this pre-existing Secret for Postgres bootstrap credentials.
    existingSecret: ""
    # Set to true only for explicit local/dev installs that intentionally use
    # the stock trackone/trackone/trackone bootstrap credentials.
    allowInsecureDefaults: false
    # Rendered into the generated postgres-auth Secret when existingSecret is
    # empty. Override in environment-specific values if Postgres is shared or
    # managed externally.
    database: trackone
    username: trackone
    password: trackone
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 1Gi

gateway:
  enabled: true
  # If set, the chart will not create trackone-gateway-config and will instead
  # reference this pre-existing ConfigMap for non-secret gateway config.
  existingConfigMap: ""
  # If set, the chart will not create trackone-gateway-env and will instead
  # reference this pre-existing Secret for sensitive gateway config.
  existingSecret: ""
  image:
    repository: ghcr.io/bilalobe/trackone/gateway
    tag: 0.1.0-alpha.10
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    nodePort: 30080
  env:
    # Rendered into the generated trackone-gateway-config ConfigMap.
    otsCalendars: http://ots-calendar:8468
    # Rendered into the generated trackone-gateway-env Secret.
    databaseUrl: postgresql://trackone:trackone@postgres:5432/trackone
  probes:
    readinessPath: /health
    livenessPath: /health
    readinessInitialDelay: 2
    readinessPeriod: 5
    livenessInitialDelay: 10
    livenessPeriod: 10
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 512Mi

jobs:
  enabled: false
  backoffLimit: 0
  core:
    enabled: true
    image:
      repository: trackone/core
      tag: local
      pullPolicy: Never
    features: "std,gateway"
    noDefaultFeatures: "0"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 1Gi
  constants:
    enabled: true
    image:
      repository: trackone/constants
      tag: local
      pullPolicy: Never
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 1Gi
  podFw:
    enabled: true
    image:
      repository: trackone/pod-fw
      tag: local
      pullPolicy: Never
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 1Gi
