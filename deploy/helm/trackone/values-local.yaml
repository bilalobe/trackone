#
# Legacy local/Minikube override.
# Applies on top of the published-artifact defaults in values.yaml.
# Runtime config and credentials still come from the chart-managed
# ConfigMap/Secret objects; this file only changes deployment behavior.
#
namespace:
  create: true
  name: trackone

imagePullSecrets: []

otsCalendar:
  image:
    repository: trackone/ots-calendar
    tag: local
    pullPolicy: Never
  persistence:
    enabled: true
    size: 1Gi

postgres:
  auth:
    allowInsecureDefaults: true
  persistence:
    enabled: true
    size: 5Gi

gateway:
  image:
    repository: trackone/gateway
    tag: local
    pullPolicy: Never
  service:
    type: NodePort
    nodePort: 30080

jobs:
  enabled: true
