apiVersion: apps/v1
kind: Deployment
metadata:
  name: ots-calendar
  namespace: trackone
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ots-calendar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ots-calendar
    spec:
      containers:
        - name: ots-calendar
          # You must build/load this image into minikube.
          image: trackone/ots-calendar:local
          imagePullPolicy: Never
