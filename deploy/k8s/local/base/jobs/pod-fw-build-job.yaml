apiVersion: batch/v1
kind: Job
metadata:
  name: trackone-pod-fw-build
  namespace: trackone
  labels:
    app.kubernetes.io/name: trackone-pod-fw-build
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trackone-pod-fw-build
    spec:
      restartPolicy: Never
      containers:
        - name: pod-fw-build
          image: trackone/pod-fw:local
          imagePullPolicy: Never
          env:
            - name: TRACKONE_POD_FW_FEATURES
              value: "production"
            - name: TRACKONE_POD_FW_NO_DEFAULT_FEATURES
              value: "1"
            - name: TRACKONE_POD_FW_RELEASE
              value: "1"
