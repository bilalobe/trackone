apiVersion: batch/v1
kind: Job
metadata:
  name: trackone-constants-build
  namespace: trackone
  labels:
    app.kubernetes.io/name: trackone-constants-build
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trackone-constants-build
    spec:
      restartPolicy: Never
      containers:
        - name: constants-build
          image: trackone/constants:local
          imagePullPolicy: Never
