# Tox configuration for Track1 project
# Run multi-environment testing: tox (runs all envs)
# Run specific environment: tox -e py311
# Run with parallel execution: tox -p
#
# ROLE SEPARATION:
# - maturin: sole *build backend* for Python wheels (build-system in pyproject.toml)
# - tox-uv: orchestrates environments, dependencies, and test runs
# - pip/uv: installs Python dependencies
# - cargo: manages Rust dependencies and native builds (invoked by maturin)

[tox]
envlist = py312,py313,py314,lint,type,security
isolated_build = true
skipsdist = false

[testenv]
# Run tests across Python versions
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    # Fast unit tests with parallel execution
    pytest tests -n auto -m "not slow and not real_ots" --cov --cov-report=term --cov-report=xml
setenv =
    PYTHONPATH = {toxinidir}

[testenv:maturin-build]
description = Build wheel with maturin
skip_install = true
deps =
    maturin>=1.7,<2.0
commands =
    maturin build --release --bindings pyo3 --manifest-path crates/trackone-gateway/Cargo.toml --out target/wheels
allowlist_externals =
    maturin

[testenv:test-wheel]
description = Test against maturin-built wheel (no editable install)
skip_install = true
deps =
    -r requirements-dev.txt
commands_pre =
    python -m pip install --no-deps --force-reinstall {toxinidir}/target/wheels/trackone-*.whl
commands =
    pytest tests -n auto -m "not slow and not real_ots" --cov --cov-report=term-missing
setenv =
    PYTHONPATH = {toxinidir}

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:py314]
basepython = python3.14

[testenv:lint]
# Linting environment
skip_install = false
deps =
    ruff>=0.10.0
    black>=24.0.0
commands =
    ruff check scripts
    black --check scripts

[testenv:format]
# Auto-format code
skip_install = true
deps =
    ruff>=0.10.0
    black>=24.0.0
commands =
    ruff check --fix scripts
    black scripts

[testenv:type]
# Type checking environment
skip_install = false
deps =
    mypy>=1.0.0
    types-requests
    types-jsonschema
    -r requirements.txt
    -r requirements-dev.txt
commands =
    mypy scripts/gateway scripts/pod_sim --show-traceback

[testenv:security]
# Security scanning environment
skip_install = false
deps =
    bandit>=1.7.8
    pip-audit>=2.7.3
commands =
    bandit -r scripts/gateway scripts/pod_sim -ll
    python -m pip install --upgrade pip pip-audit
    pip-audit

[testenv:coverage]
# Detailed coverage report with HTML
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    pytest tests -n auto -m "not real_ots" --cov --cov-report=html --cov-report=term-missing
    python -c "import webbrowser; webbrowser.open('htmlcov/index.html')"

[testenv:slow]
# Run slow tests (including real OTS tests)
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
setenv =
    RUN_REAL_OTS = 1
    PYTHONPATH = {toxinidir}
commands =
    pytest tests -m "slow or real_ots" -v --timeout=60

[testenv:pipeline]
# Run deterministic pipeline and emit artifacts under out/site_demo
skip_install = false
basepython = python3.14
deps =
    -r requirements.txt
    -r requirements-dev.txt
setenv =
    PYTHONPATH = {toxinidir}
    PIPELINE_OUT_DIR = out/site_demo
    PIPELINE_DATE = 2025-10-07
commands =
    python scripts/gateway/run_pipeline_demo.py

[testenv:e2e]
# Run full end-to-end tests
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
passenv =
    STRICT_VERIFY
    STRICT_SHA
    RUN_BITCOIND
    SQUASH_BAK
    OUT_DIR
commands =
    pytest tests/e2e -v

[testenv:sha]
# Run SHA verification tests
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
passenv =
    STRICT_SHA
    OUT_DIR
commands =
    pytest tests -k sha -v

[testenv:ots]
# Run OTS verification tests
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
passenv =
    STRICT_VERIFY
    TIMEOUT_SECS
    OUT_DIR
    RUN_BITCOIND
commands =
    pytest tests -k ots -v --timeout=600

[testenv:one]
# Run a single test (usage: tox -e one -- path/to/test.py::test_name)
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    pytest {posargs}

[testenv:bench]
# Run pytest-benchmark suite
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    pytest tests/bench -v --benchmark-only --benchmark-autosave

[testenv:ots-cal]
description = Integration tests for OTS plumbing against a local calendar (non-blocking)
extras =
commands_pre = bash -c 'if docker image inspect ots/calendar:latest >/dev/null 2>&1; then \
    export OTS_STATIONARY_STUB=1 OTS_CALENDARS="http://127.0.0.1:8468" RUN_REAL_OTS=0; \
    rc=0; \
    pytest tests/integration/test_ots_integration.py -m "not real_ots" || rc=$?; \
    # Treat "no tests collected" (pytest exit code 5) or explicit "0 selected" in cache as soft success. \
    if [ "$rc" -eq 5 ] || grep -q "0 selected" .tox/ots-cal/.pytest_cache/v/cache/lastfailed 2>/dev/null; then \
      echo "[ots-cal] pytest deselected all tests (0 selected); treating as soft success."; \
      exit 0; \
    fi; \
    exit $rc; \
  else \
    echo "SKIPPING: ots-cal integration because ots/calendar:latest image is not available."; \
  fi'
commands_post = bash -c 'docker stop ots-calendar || true'
allowlist_externals =
    bash
    docker
    pytest
