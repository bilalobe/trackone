# Tox configuration for Track1 project
# Run multi-environment testing: tox (runs all envs)
# Run specific environment: tox -e py312
# Run with parallel execution: tox -p
#
# ROLE SEPARATION:
# - maturin: sole *build backend* for Python wheels (build-system in pyproject.toml)
# - tox-uv: orchestrates environments, dependencies, and test runs
# - pip/uv: installs Python dependencies
# - cargo: manages Rust dependencies and native builds (invoked by maturin)

[tox]
envlist = py312,py313,py314,lint,type,schema,security
skipsdist = true
requires =
    tox-uv>=1.16.0

# Use uv (via tox-uv) and enforce the committed uv.lock.
# This keeps CI and local installs deterministic and aligned with Dependabot's scan.

[testenv]
# Run tests across Python versions
# Install dependencies from the committed uv.lock via uv sync.
# Source-test environments import the checkout through PYTHONPATH. Wheel builds
# are owned by the explicit maturin/build-wheel paths.
package = skip
runner = uv-venv-lock-runner
extras =
    test
    legacy-crypto
    peer-signatures
commands =
    # Use per-env coverage outputs so `tox -p` can't race on shared files.
    pytest tests -n auto -m "not slow and not real_ots" --cov --cov-report=term --cov-report=xml:{toxworkdir}/coverage.{envname}.xml
setenv =
    # Keep uv cache writable in constrained/local environments.
    UV_CACHE_DIR = {toxworkdir}/.uv-cache
    PYTHONPATH = {toxinidir}:{toxinidir}/src
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
uv_sync_locked = true

[testenv:maturin-build]
description = Build wheel with maturin
runner = uv-venv-runner
skip_install = true
deps =
    maturin>=1.7,<2.0
commands =
    maturin build --release --locked --bindings pyo3 --manifest-path crates/trackone-gateway/Cargo.toml --out target/wheels
allowlist_externals =
    maturin

[testenv:test-wheel]
description = Test against maturin-built wheel (no editable install)
runner = uv-venv-runner
depends = maturin-build
skip_install = true
changedir = {envtmpdir}
setenv =
    {[testenv]setenv}
    PYTHONPATH =
    TRACKONE_REQUIRE_NATIVE = 1
    TRACKONE_WHEEL_ONLY = 1
allowlist_externals =
    uv
commands_pre =
    python -c "import os, pathlib; pathlib.Path(os.environ['UV_CACHE_DIR']).mkdir(parents=True, exist_ok=True)"
    python -m ensurepip --upgrade
    python -m pip install --upgrade pip
    uv export --format requirements.txt --frozen --extra test --no-emit-project --output-file {envtmpdir}/requirements-test.txt
    python -m pip install -r {envtmpdir}/requirements-test.txt
    python -c "import pathlib, shutil; src=pathlib.Path(r'{toxinidir}')/'tests'/'unit'/'trackone_core'; dst=pathlib.Path(r'{envtmpdir}')/'wheel_tests'/'trackone_core_tests'; shutil.copytree(src, dst, dirs_exist_ok=True)"
    python {toxinidir}/scripts/ci/install_wheel.py --repo-root {toxinidir}
commands =
    pytest {envtmpdir}/wheel_tests/trackone_core_tests -n auto --cov=trackone_core --cov-report=term-missing

[testenv:test-wheel-ci]
description = Test against a pre-downloaded wheel artifact (no rebuild; for CI matrix use)
runner = uv-venv-runner
skip_install = true
changedir = {envtmpdir}
setenv =
    {[testenv]setenv}
    PYTHONPATH =
    TRACKONE_REQUIRE_NATIVE = 1
    TRACKONE_WHEEL_ONLY = 1
allowlist_externals =
    uv
commands_pre =
    python -c "import os, pathlib; pathlib.Path(os.environ['UV_CACHE_DIR']).mkdir(parents=True, exist_ok=True)"
    python -m ensurepip --upgrade
    python -m pip install --upgrade pip
    uv export --format requirements.txt --frozen --extra test --no-emit-project --output-file {envtmpdir}/requirements-test.txt
    python -m pip install -r {envtmpdir}/requirements-test.txt
    python -c "import pathlib, shutil; src=pathlib.Path(r'{toxinidir}')/'tests'/'unit'/'trackone_core'; dst=pathlib.Path(r'{envtmpdir}')/'wheel_tests'/'trackone_core_tests'; shutil.copytree(src, dst, dirs_exist_ok=True)"
    python {toxinidir}/scripts/ci/install_wheel.py --repo-root {toxinidir}
commands =
    pytest {envtmpdir}/wheel_tests/trackone_core_tests -n auto --cov=trackone_core --cov-report=term-missing

[testenv:wheel-resolve]
description = Wheel install via live pip resolution (smoke)
runner = uv-venv-runner
skip_install = true
changedir = {envtmpdir}
setenv =
    {[testenv]setenv}
    PYTHONPATH =
commands_pre =
    python -m ensurepip --upgrade
commands =
    python -m pip install --upgrade pip
    python -c "import glob, os, subprocess, sys; wheels=glob.glob(r'{toxinidir}/target/wheels/trackone-*.whl'); assert wheels, 'No wheel found under target/wheels; run tox -e maturin-build first or download the CI wheel artifact'; wheel=max(wheels, key=os.path.getmtime); print('Installing wheel:', wheel); subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', wheel])"
    python -m pip check
    python -c "import trackone_core, trackone_core._native as native; print('trackone_core', getattr(trackone_core, '__version__', '<no __version__>'), 'native', getattr(native, '__version__', '<no __version__>'))"
    python -c "import importlib.util; assert importlib.util.find_spec('scripts') is None, 'scripts package should not be present in wheel-only install'; print('scripts package absent (expected)')"

[testenv:archive-independent]
description = Run the stdlib-only public vector verifier outside the repo layout
runner = uv-venv-runner
skip_install = true
changedir = {envtmpdir}
setenv =
    {[testenv]setenv}
    PYTHONPATH =
commands_pre =
    python -c "import pathlib, shutil; root=pathlib.Path(r'{toxinidir}'); tmp=pathlib.Path(r'{envtmpdir}'); shutil.copy2(root/'toolset'/'independent-verifier'/'verify_vector_corpus.py', tmp/'verify_vector_corpus.py'); shutil.copytree(root/'toolset'/'vectors'/'trackone-canonical-cbor-v1', tmp/'trackone-canonical-cbor-v1', dirs_exist_ok=True)"
commands =
    python -m py_compile verify_vector_corpus.py
    python verify_vector_corpus.py trackone-canonical-cbor-v1

[testenv:archive-evidence-scenario]
description = Export a day bundle, then verify it from a detached stdlib-only context
basepython = python3.14
extras =
    test
passenv =
    ARCHIVE_SCENARIO_RESULT
    PIPELINE_*
    OTS_*
    ANCHOR_*
setenv =
    {[testenv]setenv}
    ARCHIVE_DAY = {env:PIPELINE_DATE:2025-10-07}
    ARCHIVE_SITE = {env:PIPELINE_SITE:an-001}
    OTS_STATIONARY_STUB = 1
commands =
    python scripts/gateway/run_pipeline_demo.py --out-dir {envtmpdir}/pipeline --date {env:ARCHIVE_DAY} --site {env:ARCHIVE_SITE}
    python scripts/gateway/check_verify_manifest.py --root {envtmpdir}/pipeline --facts {envtmpdir}/pipeline/facts --day {env:ARCHIVE_DAY}
    python scripts/evidence/export_release.py --pipeline-dir {envtmpdir}/pipeline --evidence-repo {envtmpdir}/evidence --site {env:ARCHIVE_SITE} --day {env:ARCHIVE_DAY}
    python -c "import os, pathlib, shutil; root=pathlib.Path(r'{toxinidir}'); tmp=pathlib.Path(r'{envtmpdir}')/'detached'; tmp.mkdir(parents=True, exist_ok=True); shutil.copy2(root/'toolset'/'independent-verifier'/'verify_vector_corpus.py', tmp/'verify_vector_corpus.py'); shutil.copytree(pathlib.Path(r'{envtmpdir}')/'evidence'/'site'/os.environ['ARCHIVE_SITE']/'day'/os.environ['ARCHIVE_DAY'], tmp/'bundle', dirs_exist_ok=True)"
    python -c "import os, pathlib, subprocess, sys; env=os.environ.copy(); env.pop('PYTHONPATH', None); result=env.get('ARCHIVE_SCENARIO_RESULT') or str(pathlib.Path(r'{envtmpdir}')/'archive-evidence-scenario-result.json'); subprocess.check_call([sys.executable, str(pathlib.Path(r'{envtmpdir}')/'detached'/'verify_vector_corpus.py'), '--bundle-root', str(pathlib.Path(r'{envtmpdir}')/'detached'/'bundle'), '--output', result], cwd=pathlib.Path(r'{envtmpdir}')/'detached', env=env)"

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:py314]
basepython = python3.14

[testenv:lint]
# Linting environment
package = skip
extras =
    lint
setenv =
    {[testenv]setenv}
    UV_NO_DEV = 1
commands =
    ruff check scripts src/trackone_core
    black --check scripts src/trackone_core

[testenv:readme]
# README / ADR / docs markdown checks
package = skip
extras =
    lint
setenv =
    {[testenv]setenv}
    UV_NO_DEV = 1
commands =
    mdformat --check README.md adr docs
    python -c "from pathlib import Path; idx = Path('adr/README.md'); assert idx.exists(), 'adr/README.md missing'; print('ADR index present:', idx)"

[testenv:precommit]
# Run the full pre-commit hook suite
package = skip
extras =
    precommit
setenv =
    {[testenv]setenv}
commands =
    pre-commit run --all-files

[testenv:format]
# Auto-format code
package = skip
extras =
    lint
setenv =
    {[testenv]setenv}
    UV_NO_DEV = 1
commands =
    ruff check --fix scripts src/trackone_core
    black scripts src/trackone_core

[testenv:type]
# Type checking environment
package = skip
extras =
    type
setenv =
    {[testenv]setenv}
    UV_NO_DEV = 1
commands =
    mypy scripts/gateway scripts/pod_sim src/trackone_core --show-traceback

[testenv:schema]
# Explicit schema-validation and contract-gating lane
package = skip
extras =
    test
    validation
setenv =
    {[testenv]setenv}
    UV_NO_DEV = 1
commands =
    pytest tests/integration/test_schema_validation.py tests/unit/gateway/test_verify_cli_manifest.py tests/unit/gateway/test_run_pipeline_demo.py tests/unit/gateway/test_check_verify_manifest.py tests/evidence/test_export_release.py -q

[testenv:security]
# Security scanning environment
package = skip
extras =
    security
setenv =
    {[testenv]setenv}
    UV_NO_DEV = 1
commands =
    bandit -r scripts/gateway scripts/pod_sim src/trackone_core -ll
    pip-audit

[testenv:coverage]
# Detailed coverage report with HTML
extras =
    test
    legacy-crypto
    peer-signatures
setenv =
    {[testenv]setenv}
commands =
    pytest tests -n auto -m "not real_ots" --cov --cov-report=html:{toxworkdir}/htmlcov.{envname} --cov-report=term-missing --cov-report=xml:{toxworkdir}/coverage.{envname}.xml

[testenv:slow]
# Run slow tests (including real OTS tests)
extras =
    test
setenv =
    {[testenv]setenv}
    RUN_REAL_OTS = 1
commands =
    pytest tests -m "slow or real_ots" -v --timeout=60

[testenv:pipeline]
# Run deterministic pipeline and emit artifacts under out/site_demo
basepython = python3.14
extras =
    test
passenv =
    PIPELINE_*
    OTS_*
    ANCHOR_*
setenv =
    {[testenv]setenv}
    PIPELINE_OUT_DIR = out/site_demo
    PIPELINE_DATE = 2025-10-07
commands =
    python scripts/gateway/run_pipeline_demo.py {posargs}
    python scripts/gateway/check_verify_manifest.py --root {env:PIPELINE_OUT_DIR} --facts {env:PIPELINE_OUT_DIR}/facts --day {env:PIPELINE_DATE}

[testenv:e2e]
# Run full end-to-end tests
extras =
    test
setenv =
    {[testenv]setenv}
passenv =
    STRICT_VERIFY
    STRICT_SHA
    RUN_BITCOIND
    SQUASH_BAK
    OUT_DIR
commands =
    pytest tests/e2e -v

[testenv:sha]
# Run SHA verification tests
extras =
    test
setenv =
    {[testenv]setenv}
passenv =
    STRICT_SHA
    OUT_DIR
commands =
    pytest tests/integration/test_sha_artifacts.py -v

[testenv:ots]
# Run OTS verification tests
extras =
    test
setenv =
    {[testenv]setenv}
passenv =
    STRICT_VERIFY
    TIMEOUT_SECS
    OUT_DIR
    RUN_BITCOIND
commands =
    pytest tests -k ots -v --timeout=600

[testenv:one]
# Run a single test (usage: tox -e one -- path/to/test.py::test_name)
extras =
    test
setenv =
    {[testenv]setenv}
commands =
    pytest {posargs}

[testenv:bench]
# Run pytest-benchmark suite
package = skip
extras =
    test
    legacy-crypto
setenv =
    {[testenv]setenv}
    UV_NO_DEV = 1
commands =
    pytest tests/bench -v --benchmark-only --benchmark-autosave

[testenv:ots-cal]
description = Integration tests for OTS plumbing against a local calendar (non-blocking)
extras =
    test
    legacy-crypto
    peer-signatures
setenv =
    {[testenv]setenv}
    # Ensure test module discovery works when running via tox.
    # Enable real OTS tests in this env (they will still skip if the `ots` binary isn't present).
    RUN_REAL_OTS = 1
    # Prefer the local calendar started by commands_pre.
    OTS_CALENDARS = http://127.0.0.1:8468
    OTS_STATIONARY_STUB = 0
commands_pre =
    bash -c 'set -euo pipefail; \
      if docker ps -q --filter "name=trackone_ots_calendar" | grep -q .; then \
        echo "[ots-cal] Using running container trackone_ots_calendar"; \
        exit 0; \
      fi; \
      repo="${GITHUB_REPOSITORY:-bilalobe/trackone}"; \
      image="ghcr.io/${repo}/ots-calendar:latest"; \
      if ! docker image inspect "$image" >/dev/null 2>&1; then \
        echo "SKIPPING: ots-cal integration because neither a running trackone_ots_calendar container nor $image is available."; \
        exit 0; \
      fi; \
      echo "[ots-cal] Starting local calendar container from $image"; \
      docker run -d -p 8468:8468 --name trackone_ots_calendar "$image" >/dev/null; \
      tries=0; \
      until curl -fsS -o /dev/null http://127.0.0.1:8468/ || [ $tries -ge 30 ]; do \
        tries=$((tries+1)); \
        sleep 2; \
      done; \
      if [ $tries -ge 30 ]; then \
        echo "::warning::Local calendar did not become ready in time; printing logs and skipping"; \
        docker logs trackone_ots_calendar || true; \
        exit 0; \
      fi'
commands =
    bash -c 'rc=0; pytest tests/integration/test_ots_integration.py -m "real_ots" -v || rc=$?; if [ "$rc" -eq 5 ]; then echo "[ots-cal] pytest selected 0 tests; treating as soft success."; exit 0; fi; exit $rc'
commands_post =
    bash -c 'docker stop trackone_ots_calendar >/dev/null 2>&1 || true; docker rm -f trackone_ots_calendar >/dev/null 2>&1 || true'
allowlist_externals =
    bash
    docker
    pytest
    curl
