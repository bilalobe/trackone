# Tox configuration for Track1 project
# Run multi-environment testing: tox (runs all envs)
# Run specific environment: tox -e py311
# Run with parallel execution: tox -p

[tox]
envlist = py311,py312,py313,lint,type,security
isolated_build = true
skipsdist = false

[testenv]
# Run tests across Python versions
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    # Fast unit tests with parallel execution
    pytest scripts/tests -n auto -m "not slow and not real_ots" --cov --cov-report=term --cov-report=xml
setenv =
    PYTHONPATH = {toxinidir}

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:lint]
# Linting environment
skip_install = false
deps =
    ruff>=0.10.0
    black>=24.0.0
commands =
    ruff check scripts
    black --check scripts

[testenv:format]
# Auto-format code
skip_install = true
deps =
    ruff>=0.10.0
    black>=24.0.0
commands =
    ruff check --fix scripts
    black scripts

[testenv:type]
# Type checking environment
skip_install = false
deps =
    mypy>=1.0.0
    -r requirements.txt
    -r requirements-dev.txt
commands =
    mypy scripts/gateway scripts/pod_sim --show-traceback

[testenv:security]
# Security scanning environment
skip_install = false
deps =
    bandit>=1.7.8
    pip-audit>=2.7.3
commands =
    bandit -r scripts/gateway scripts/pod_sim -ll
    pip-audit

[testenv:coverage]
# Detailed coverage report with HTML
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    pytest scripts/tests -n auto -m "not real_ots" --cov --cov-report=html --cov-report=term-missing
    python -c "import webbrowser; webbrowser.open('htmlcov/index.html')"

[testenv:slow]
# Run slow tests (including real OTS tests)
skip_install = false
deps =
    -r requirements.txt
    -r requirements-dev.txt
setenv =
    RUN_REAL_OTS = 1
commands =
    pytest scripts/tests -m "slow or real_ots" -v --timeout=60
