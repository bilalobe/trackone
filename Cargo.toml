[workspace]
resolver = "2"
members = [
    "crates/trackone-core",
    "crates/trackone-gateway",
    "crates/trackone-pod-fw",
    "crates/trackone-constants",
    "crates/trackone-ledger",
]

[workspace.package]
version = "0.1.0-alpha.3"
edition = "2021"
publish = true
license = "MIT"
authors = ["BILAL <elkhatabibilal@gmail.com>"]
repository = "https://github.com/bilalobe/trackone"

[workspace.dependencies]
   pyo3 = { version = "0.28.2", features = ["extension-module", "abi3-py312"] }

   # Common third-party deps (centralize versions)
   serde = { version = "1.0.228", default-features = false, features = ["derive"] }
   serde_json = "1.0.149"
   sha2 = { version = "0.11.0-rc.5", default-features = false }

   heapless = { version = "0.9.2", default-features = false, features = ["serde"] }
   postcard = { version = "1.1.3", default-features = false }
   serde_repr = "0.1.20"
   serde-big-array = "0.5.1"
   zeroize = { version = "1.8.2", default-features = false, features = ["derive"] }
   ciborium = "0.2.2"

   # Dev/test helpers used by core/ledger crates
   serde_json_canonicalizer = "0.3.2"

   # Internal crates (crates.io)
   trackone-core = { version = "0.1.0-alpha.3", default-features = false }
   trackone-ledger = { version = "0.1.0-alpha.3" }
   trackone-constants = { version = "0.1.0-alpha.3" }

[profile.release]
lto = true
codegen-units = 1
opt-level = "z"
strip = true
panic = "abort"
