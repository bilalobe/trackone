version: '3.8'

services:
  ots-calendar:
    image: ots/calendar:latest
    container_name: ots-calendar
    restart: unless-stopped
    ports:
      - "8468:8468"
    environment:
      # Add any calendar-specific configuration here if needed
      # For a basic setup, defaults are usually sufficient.
      OTS_LOG_LEVEL: info
    volumes:
      # Persist calendar state across restarts
      - ./data/ots-calendar:/var/lib/ots-calendar
