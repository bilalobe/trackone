version: 2

updates:
  # Python dependencies managed via pyproject.toml + uv.lock
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # Dependabot updates pyproject.toml constraints, but this repo treats
    # uv.lock as part of the verified Python/wheel surface. Version-update PRs
    # therefore need to stay small and intentional; maintainers regenerate the
    # lockfile explicitly via `uv lock`.
    allow:
      - dependency-type: "direct"
    groups:
      python-runtime:
        dependency-type: "production"
        patterns:
          - "*"
      python-tooling:
        dependency-type: "development"
        patterns:
          - "*"
    cooldown:
      semver-minor-days: 14
      semver-patch-days: 14
      include:
        - "black"
        - "ruff"
        - "mypy"
        - "pytest"
        - "pytest-*"
        - "hypothesis"
        - "tox"
        - "tox-uv"
        - "bandit"
        - "pip-audit"
        - "time-machine"
    ignore:
      - dependency-name: "uv"
      - dependency-name: "mdformat"
      - dependency-name: "mdformat-gfm"
      - dependency-name: "mdformat-ruff"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 2

  # Rust workspace (trackone-core, trackone-gateway, trackone-pod-fw,...)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "rust"
    open-pull-requests-limit: 5

  # GitHub Actions workflows, if/when they exist in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 2
