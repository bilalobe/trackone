name: OTS Calendar

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/gateway/**'
      - 'docs/ots-verification.md'
      - '.github/workflows/ots-cal.yml'
      - 'tox.ini'

jobs:
  ots-cal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tox
        run: |
          pip install tox

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local OTS calendar image
        run: |
          echo "Building local ots/calendar:latest image for integration tests"
          docker build -t ots/calendar:latest docker/calendar

      - name: Verify Docker availability
        run: |
          echo "Docker version:"
          docker --version
          echo "Docker info:"
          docker info

      - name: Wait for calendar health
        run: |
          echo "Waiting for local calendar on http://127.0.0.1:8468"
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8468/ >/dev/null 2>&1; then
              echo "Local OTS calendar ready."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Local OTS calendar did not become ready in time."
          exit 1

      - name: Run real OTS integration tests against local calendar
        env:
          OTS_CALENDARS: http://127.0.0.1:8468
          OTS_STATIONARY_STUB: 0
        run: tox -e ots-cal
