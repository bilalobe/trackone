name: OTS Calendar

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/gateway/**'
      - 'docs/ots-verification.md'
      - '.github/workflows/ots-cal.yml'
      - 'tox.ini'

jobs:
  ots-cal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-otscal-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}

      - name: Install tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[ci]"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local OTS calendar image (tagged as ghcr.io/<repo>/ots-calendar:latest)
        env:
          IMAGE: ghcr.io/${{ github.repository }}/ots-calendar:latest
        run: |
          echo "Building local calendar image for integration tests: $IMAGE"
          docker build -t "$IMAGE" docker/calendar

      - name: Verify Docker availability
        run: |
          echo "Docker version:"
          docker --version
          echo "Docker info:"
          docker info

      - name: Run real OTS integration tests against local calendar
        env:
          # Used by tox.ini to locate the ghcr.io/<repo>/ots-calendar:latest tag.
          GITHUB_REPOSITORY: ${{ github.repository }}
          OTS_CALENDARS: http://127.0.0.1:8468
          OTS_STATIONARY_STUB: 0
          RUN_REAL_OTS: 1
        run: tox -e ots-cal
