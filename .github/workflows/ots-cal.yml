name: OTS Calendar

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/gateway/**'
      - 'docs/ots-verification.md'
      - '.github/workflows/ots-cal.yml'
      - 'tox.ini'

jobs:
  ots-cal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tox
        run: |
          pip install tox

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local OTS calendar image
        run: |
          echo "Building local ots/calendar:latest image for integration tests"
          docker build -t ots/calendar:latest docker/calendar

      - name: Verify Docker availability
        run: |
          echo "Docker version:"
          docker --version
          echo "Docker info:"
          docker info

      - name: Run real OTS integration tests against local calendar
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          tox -e ots-cal
