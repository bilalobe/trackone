name: OTS Verify (headers)

on:
  push:
    branches:
      - 'ci/ots-verify-draft'
  pull_request:
    types: [opened, reopened, synchronize]
  # Allow a label on a PR to explicitly request a run (no files need to change)
  pull_request_target:
    types: [labeled]
  # Allow manual runs from the Actions UI
  workflow_dispatch:
    inputs:
      run_bitcoind:
        description: 'Force bitcoind start (1=yes, 0=no; default: auto-decide based on context)'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - '1'
          - '0'

permissions:
  contents: read

concurrency:
  group: ots-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ots-verify:
    # Only run this job when it's one of:
    # - a push (push trigger still applies),
    # - a pull_request (any PR) — label gating is handled below,
    # - a pull_request_target labeled event where the label name is 'run-ots-verify',
    # - or a manual workflow_dispatch.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label && github.event.label.name == 'run-ots-verify')
    runs-on: ubuntu-latest
    env:
      BITCOIN_CORE_VERSION: '28.1'
    steps:
      - name: Checkout (normal events)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout PR head (when invoked via pull_request_target labeled)
        if: github.event_name == 'pull_request_target' && github.event.pull_request
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          lfs: true

      - name: Check for OTS files
        id: check_ots
        run: |
          shopt -s nullglob
          files=(out/site_demo/day/*.ots)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No OTS files found; skipping verification."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found ${#files[@]} OTS file(s)."
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to start bitcoind
        id: decide_run_bitcoind
        if: steps.check_ots.outputs.found == 'true'
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REF_NAME: ${{ github.ref_name }}
          PR_DRAFT: ${{ github.event.pull_request.draft || 'false' }}
          PR_ACTION: ${{ github.event.action || '' }}
          PR_LABEL: ${{ github.event.label.name || '' }}
          DISPATCH_INPUT: ${{ github.event.inputs.run_bitcoind || 'auto' }}
        run: |
          # Default: don't run bitcoind
          run=0
          echo "Context: EVENT=$GH_EVENT_NAME REF=$GH_REF_NAME ACTION=$PR_ACTION DRAFT=$PR_DRAFT LABEL=$PR_LABEL DISPATCH_INPUT=$DISPATCH_INPUT"

          # If workflow_dispatch input explicitly sets run_bitcoind, respect it (unless 'auto')
          if [ "$DISPATCH_INPUT" = "1" ]; then
            echo "workflow_dispatch input forces RUN_BITCOIND=1"
            run=1
          elif [ "$DISPATCH_INPUT" = "0" ]; then
            echo "workflow_dispatch input forces RUN_BITCOIND=0"
            run=0
          else
            # Auto-decide based on event context
            # Manual runs and main branch should run bitcoind
            if [ "$GH_EVENT_NAME" = 'workflow_dispatch' ] || [ "$GH_REF_NAME" = 'main' ]; then
              run=1
            fi
            # For pull_request_target labeled events, run only when label is the explicit trigger
            if [ "$GH_EVENT_NAME" = 'pull_request_target' ] && [ "$PR_ACTION" = 'labeled' ] && [ "$PR_LABEL" = 'run-ots-verify' ]; then
              run=1
            fi
          fi
          echo "run_bitcoind=$run" >> "$GITHUB_OUTPUT"

      - name: Restore bitcoin headers cache
        if: steps.check_ots.outputs.found == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bitcoin
          key: bitcoin-headers-${{ runner.os }}-v${{ env.BITCOIN_CORE_VERSION }}
          restore-keys: |
            bitcoin-headers-${{ runner.os }}-

      - name: Set up Python
        if: steps.check_ots.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        if: steps.check_ots.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl tar
          pip3 install --upgrade pip
          pip3 install opentimestamps-client

      - name: Install Bitcoin Core (bitcoind)
        if: steps.check_ots.outputs.found == 'true'
        run: |
          cd "$RUNNER_TEMP"
          curl -L -o bitcoin.tar.gz https://bitcoincore.org/bin/bitcoin-core-${BITCOIN_CORE_VERSION}/bitcoin-${BITCOIN_CORE_VERSION}-x86_64-linux-gnu.tar.gz
          tar -xzf bitcoin.tar.gz
          echo "$RUNNER_TEMP/bitcoin-${BITCOIN_CORE_VERSION}/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/bitcoin-${BITCOIN_CORE_VERSION}/bin:$PATH"
          bitcoind -version
          bitcoin-cli -version

      - name: Make CI script executable
        if: steps.check_ots.outputs.found == 'true'
        run: |
          chmod +x scripts/ci/ots_verify.sh

      - name: Run OTS verification helper
        if: steps.check_ots.outputs.found == 'true'
        timeout-minutes: 15
        env:
          # Strict on main pushes, lenient on PRs/other branches
          STRICT_VERIFY: ${{ github.ref_name == 'main' && '1' || '0' }}
          # Derived from the prior decide step
          RUN_BITCOIND: ${{ steps.decide_run_bitcoind.outputs.run_bitcoind || '0' }}
        run: |
          scripts/ci/ots_verify.sh out/site_demo/day

      - name: Upload Bitcoin logs (on failure)
        if: failure() && steps.check_ots.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-logs
          path: |
            ~/.bitcoin/debug.log
            ~/.bitcoin/*.log
            ~/.bitcoin/*.dat
          if-no-files-found: ignore
          retention-days: 7

      - name: Save bitcoin headers cache
        if: steps.check_ots.outputs.found == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bitcoin
          key: bitcoin-headers-${{ runner.os }}-v${{ env.BITCOIN_CORE_VERSION }}-${{ github.run_id }}
          restore-keys: |
            bitcoin-headers-${{ runner.os }}-v${{ env.BITCOIN_CORE_VERSION }}
            bitcoin-headers-${{ runner.os }}-
