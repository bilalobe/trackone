name: OTS Verify (headers)

on:
  push:
    branches:
      - 'ci/ots-verify-draft'
  # Allow a label on a PR to explicitly request a run (no files need to change)
  pull_request_target:
    types: [labeled]
  # Allow manual runs from the Actions UI
  workflow_dispatch:
    inputs:
      run_bitcoind:
        description: 'Force bitcoind start (1=yes, 0=no; default: auto-decide based on context)'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - '1'
          - '0'

permissions:
  contents: read

concurrency:
  group: ots-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ots-verify:
    # Only run this job when it's one of:
    # - a push (push trigger still applies),
    # - a pull_request_target labeled event where the label name is 'run-ots-verify' (same-repo PRs only),
    # - or a manual workflow_dispatch.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
        github.event.action == 'labeled' &&
        github.event.label &&
        github.event.label.name == 'run-ots-verify' &&
        github.event.pull_request &&
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    env:
      BITCOIN_CORE_VERSION: '28.1'
    steps:
      - name: Checkout (normal events)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout PR head (when invoked via pull_request_target labeled)
        if: github.event_name == 'pull_request_target' && github.event.pull_request
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          lfs: true

      # Prepare Python + caches for running tox envs
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-ots-${{ hashFiles('tox.ini') }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci,test]"

      - name: Run pipeline via tox (generate artifacts)
        run: tox -e pipeline -- --keep-existing
        env:
          TOX_PYTHON: python
          PIPELINE_POLICY_MODE: ${{ github.ref_name == 'main' && 'strict' || 'warn' }}

      - name: Check for OTS files
        id: check_ots
        run: |
          shopt -s nullglob
          files=(out/site_demo/day/*.ots)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No OTS files found; skipping verification."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found ${#files[@]} OTS file(s)."
            printf '%s\n' "${files[@]}"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Decide whether to start bitcoind
        id: decide_run_bitcoind
        if: steps.check_ots.outputs.found == 'true'
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REF_NAME: ${{ github.ref_name }}
          PR_DRAFT: ${{ github.event.pull_request.draft || 'false' }}
          PR_ACTION: ${{ github.event.action || '' }}
          PR_LABEL: ${{ github.event.label.name || '' }}
          DISPATCH_INPUT: ${{ github.event.inputs.run_bitcoind || 'auto' }}
        run: |
          run=0
          echo "Context: EVENT=$GH_EVENT_NAME REF=$GH_REF_NAME ACTION=$PR_ACTION DRAFT=$PR_DRAFT LABEL=$PR_LABEL DISPATCH_INPUT=$DISPATCH_INPUT"
          if [ "$DISPATCH_INPUT" = "1" ]; then
            run=1
          elif [ "$DISPATCH_INPUT" = "0" ]; then
            run=0
          else
            if [ "$GH_EVENT_NAME" = 'workflow_dispatch' ] || [ "$GH_REF_NAME" = 'main' ]; then
              run=1
            fi
            if [ "$GH_EVENT_NAME" = 'pull_request_target' ] && [ "$PR_ACTION" = 'labeled' ] && [ "$PR_LABEL" = 'run-ots-verify' ]; then
              run=1
            fi
          fi
          echo "run_bitcoind=$run" >> "$GITHUB_OUTPUT"

      - name: Restore bitcoin headers cache
        if: steps.check_ots.outputs.found == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.bitcoin
          key: bitcoin-headers-${{ runner.os }}-v${{ env.BITCOIN_CORE_VERSION }}
          restore-keys: |
            bitcoin-headers-${{ runner.os }}-


      - name: Install Bitcoin Core (bitcoind)
        if: steps.check_ots.outputs.found == 'true'
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          BASE_URL="https://bitcoincore.org/bin/bitcoin-core-${BITCOIN_CORE_VERSION}"
          TARBALL="bitcoin-${BITCOIN_CORE_VERSION}-x86_64-linux-gnu.tar.gz"

          curl -fsSLO "${BASE_URL}/${TARBALL}"
          curl -fsSLO "${BASE_URL}/SHA256SUMS"

          # Verify the downloaded tarball against upstream SHA256SUMS.
          # (We still rely on HTTPS transport; this is a minimum-integrity check.)
          grep -F " ${TARBALL}" SHA256SUMS > SHA256SUMS.filtered
          test -s SHA256SUMS.filtered
          sha256sum -c SHA256SUMS.filtered

          tar -xzf "${TARBALL}"
          echo "$RUNNER_TEMP/bitcoin-${BITCOIN_CORE_VERSION}/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/bitcoin-${BITCOIN_CORE_VERSION}/bin:$PATH"
          bitcoind -version
          bitcoin-cli -version

      - name: Make CI script executable
        if: steps.check_ots.outputs.found == 'true'
        run: chmod +x scripts/ci/ots_verify.sh

      - name: Run OTS verification script
        if: steps.check_ots.outputs.found == 'true'
        timeout-minutes: 15
        env:
          STRICT_VERIFY: ${{ github.ref_name == 'main' && '1' || '0' }}
          RUN_BITCOIND: ${{ steps.decide_run_bitcoind.outputs.run_bitcoind || '0' }}
          # smart upgrade knobs
          UPGRADE_ON_PENDING: '1'
          UPGRADE_TRIES: '5'
          UPGRADE_BACKOFF_SECS: '15'
          EXPLORER_BASE: 'https://mempool.space'
        run: |
          ./scripts/ci/ots_verify.sh out/site_demo/day

      - name: Run verifier policy summary
        if: steps.check_ots.outputs.found == 'true'
        env:
          ANCHOR_POLICY_MODE: ${{ github.ref_name == 'main' && 'strict' || 'warn' }}
        run: |
          python scripts/gateway/verify_cli.py \
            --root out/site_demo \
            --facts out/site_demo/facts \
            --json > out/site_demo/day/verify_summary.json

      - name: Upload OTS proof bundle
        if: steps.check_ots.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ots-proof-bundle
          path: |
            out/site_demo/day/*.ots
            out/site_demo/day/*.cbor
            out/site_demo/day/*.json
            out/site_demo/day/*.sha256
            out/site_demo/day/ots_verify_summary.txt
            out/site_demo/day/ots_verify_summary.json
            out/site_demo/day/verify_summary.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Bitcoin logs (on failure)
        if: failure() && steps.check_ots.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: bitcoin-logs
          path: |
            ~/.bitcoin/debug.log
            ~/.bitcoin/*.log
            ~/.bitcoin/*.dat
          if-no-files-found: ignore
          retention-days: 7

      - name: Save bitcoin headers cache
        if: steps.check_ots.outputs.found == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.bitcoin
          key: bitcoin-headers-${{ runner.os }}-v${{ env.BITCOIN_CORE_VERSION }}-${{ github.run_id }}
          restore-keys: |
            bitcoin-headers-${{ runner.os }}-v${{ env.BITCOIN_CORE_VERSION }}
            bitcoin-headers-${{ runner.os }}-
