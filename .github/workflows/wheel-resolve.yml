name: Wheel Resolve

on:
  push:
    branches:
      - 'ci/wheel-resolve-draft'
  pull_request_target:
    types: [labeled]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: wheel-resolve-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wheel-resolve:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
        github.event.action == 'labeled' &&
        github.event.label &&
        github.event.label.name == 'run-wheel-resolve' &&
        github.event.pull_request &&
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (normal events)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v6

      - name: Checkout PR head (when invoked via pull_request_target labeled)
        if: github.event_name == 'pull_request_target' && github.event.pull_request
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache cargo (registry/git/target)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install build tools (maturin + tox)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "maturin>=1.7,<2.0" tox

      - name: Build wheel (locked)
        run: |
          maturin build --release --locked --bindings pyo3 --manifest-path crates/trackone-gateway/Cargo.toml --out target/wheels

      - name: Resolve-install smoke test (pip dependency resolution)
        run: tox -e wheel-resolve

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheel-resolve-${{ github.run_id }}
          path: target/wheels/*.whl
          if-no-files-found: error
          retention-days: 7
