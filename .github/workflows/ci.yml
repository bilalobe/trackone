name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            # Do not cache target/package: cargo names package archives only
            # by crate name and version, so a same-version PR can otherwise
            # reuse a stale archive from an earlier commit.
            target/debug
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --locked

      - name: Cargo test public vector corpus
        run: cargo test --locked -p trackone-ledger --test vector_corpus -- --ignored

      - name: Cargo package
        run: cargo package --workspace --locked
