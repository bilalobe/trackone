name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo (registry/git/target)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt (check)
        run: cargo fmt --all --check

      - name: Cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Cargo test (workspace)
        run: cargo test --workspace --locked

  package-crates:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14 (for pyo3 packaging checks)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry/git/target)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo package (workspace)
        run: cargo package --workspace --locked

      - name: Upload crate packages
        uses: actions/upload-artifact@v7
        with:
          name: crates-packages
          path: target/package/*.crate
          if-no-files-found: error
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-${{ hashFiles('tox.ini') }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Ensure pip, wheel and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci]"

      - name: Run lint/type/readme/schema tox envs
        run: |
          tox -e lint,type,readme,schema

      - name: Run security tox env (non-blocking)
        continue-on-error: true
        run: |
          tox -e security

  test:
    runs-on: ubuntu-latest
    needs: [lint, rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.12'
            toxenv: py312
          - python-version: '3.13'
            toxenv: py313
          - python-version: '3.14'
            toxenv: py314
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-${{ matrix.toxenv }}-${{ hashFiles('tox.ini') }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Ensure pip, wheel and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci]"

      - name: Run tests via tox
        run: |
          tox -e ${{ matrix.toxenv }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.toxenv }}
          path: .tox/coverage.${{ matrix.toxenv }}.xml
          if-no-files-found: warn
          retention-days: 7

  pipeline:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-pipeline-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-pipeline-${{ hashFiles('tox.ini') }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Ensure pip, wheel and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci]"

      - name: Run pipeline via tox
        run: tox -e pipeline -- --keep-existing

  archive-independent-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run detached stdlib-only verifier
        env:
          VERIFY_WORKDIR: ${{ runner.temp }}/trackone-archive-independent
        run: |
          set -euo pipefail
          mkdir -p "${VERIFY_WORKDIR}"
          cp toolset/independent-verifier/verify_vector_corpus.py "${VERIFY_WORKDIR}/"
          cp -R toolset/vectors/trackone-canonical-cbor-v1 "${VERIFY_WORKDIR}/"
          python -m py_compile "${VERIFY_WORKDIR}/verify_vector_corpus.py"
          cd "${VERIFY_WORKDIR}"
          env -u PYTHONPATH python verify_vector_corpus.py \
            trackone-canonical-cbor-v1 | tee result.json

      - name: Upload independent verifier result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: archive-independent-verify
          path: ${{ runner.temp }}/trackone-archive-independent/result.json
          if-no-files-found: error
          retention-days: 30

  archive-evidence-scenario:
    runs-on: ubuntu-latest
    env:
      ARCHIVE_DAY: '2025-10-07'
      ARCHIVE_SITE: an-001
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-archive-scenario-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-archive-scenario-${{ hashFiles('tox.ini') }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Ensure pip, wheel and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci]"

      - name: Run exported evidence archive scenario
        env:
          ARCHIVE_SCENARIO_RESULT: ${{ runner.temp }}/archive-evidence-scenario/result.json
          PIPELINE_DATE: ${{ env.ARCHIVE_DAY }}
          PIPELINE_SITE: ${{ env.ARCHIVE_SITE }}
        run: tox -e archive-evidence-scenario

      - name: Upload archive scenario result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: archive-evidence-scenario
          path: ${{ runner.temp }}/archive-evidence-scenario/result.json
          if-no-files-found: error
          retention-days: 30

      - name: Assemble self-contained archive bundle
        if: always()
        env:
          ARCHIVE_RESULT: ${{ runner.temp }}/archive-evidence-scenario/result.json
          ARCHIVE_TARBALL: ${{ runner.temp }}/trackone-evidence-${{ env.ARCHIVE_SITE }}-${{ env.ARCHIVE_DAY }}.tar.gz
        run: |
          set -euo pipefail
          bundle_root=".tox/archive-evidence-scenario/tmp/evidence/site/${ARCHIVE_SITE}/day/${ARCHIVE_DAY}"
          if [ ! -d "${bundle_root}" ]; then
            echo "::error::Archive evidence bundle not found: ${bundle_root}"
            exit 1
          fi

          package_dir="${RUNNER_TEMP}/trackone-archive-oci"
          rm -rf "${package_dir}"
          mkdir -p "${package_dir}/bundle" "${package_dir}/verifier" "${package_dir}/docs"
          cp -R "${bundle_root}/." "${package_dir}/bundle/"
          cp toolset/independent-verifier/verify_vector_corpus.py "${package_dir}/verifier/"
          cp toolset/independent-verifier/README.md "${package_dir}/docs/independent-verifier.md"
          cp toolset/independent-verifier/reverse_engineering_notes.md "${package_dir}/docs/reverse-engineering-notes.md"
          cp "${ARCHIVE_RESULT}" "${package_dir}/result.json"
          cat > "${package_dir}/README.md" <<EOF
          # TrackOne Archived Evidence Bundle

          This bundle is intended to verify without the TrackOne repository, CI scripts,
          or private operator context.

          Verify from the extracted bundle root:

              python verifier/verify_vector_corpus.py --bundle-root bundle

          Expected verifier output includes "ok": true.
          EOF

          (cd "${package_dir}" && find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          tar_parent="$(dirname "${package_dir}")"
          tar_name="$(basename "${package_dir}")"
          (cd "${tar_parent}" && tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -cf - "${tar_name}" | gzip -n > "${ARCHIVE_TARBALL}")
          sha256sum "${ARCHIVE_TARBALL}" > "${ARCHIVE_TARBALL}.sha256"

      - name: Upload self-contained archive bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: archive-evidence-bundle
          path: |
            ${{ runner.temp }}/trackone-evidence-${{ env.ARCHIVE_SITE }}-${{ env.ARCHIVE_DAY }}.tar.gz
            ${{ runner.temp }}/trackone-evidence-${{ env.ARCHIVE_SITE }}-${{ env.ARCHIVE_DAY }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  archive-evidence-oci:
    runs-on: ubuntu-latest
    needs: archive-evidence-scenario
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download self-contained archive bundle
        uses: actions/download-artifact@v8
        with:
          name: archive-evidence-bundle
          path: archive-evidence-bundle

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_TOKEN}" | oras login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin

      - name: Publish archive bundle to GHCR OCI
        env:
          ARCHIVE_OCI_REF: ghcr.io/${{ github.repository }}/evidence-archive:sha-${{ github.sha }}
        run: |
          set -euo pipefail
          bundle="$(ls archive-evidence-bundle/*.tar.gz)"
          sha_file="${bundle}.sha256"
          test -f "${sha_file}"
          declared_sha="$(cut -d' ' -f1 "${sha_file}")"
          actual_sha="$(sha256sum "${bundle}" | cut -d' ' -f1)"
          if [ "${declared_sha}" != "${actual_sha}" ]; then
            echo "::error::Archive tarball SHA-256 mismatch before OCI publish"
            exit 1
          fi

          oras push "${ARCHIVE_OCI_REF}" \
            --artifact-type application/vnd.trackone.evidence.archive.v1+tar \
            --annotation org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --annotation org.opencontainers.image.revision="${GITHUB_SHA}" \
            --annotation org.opencontainers.image.title="TrackOne evidence archive bundle" \
            "${bundle}:application/gzip"
          oras resolve "${ARCHIVE_OCI_REF}" | tee archive-evidence-oci-digest.txt

      - name: Pull archive bundle back from GHCR
        env:
          ARCHIVE_OCI_REF: ghcr.io/${{ github.repository }}/evidence-archive:sha-${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p pulled-archive
          oras pull --output pulled-archive "${ARCHIVE_OCI_REF}"
          pulled="$(find pulled-archive -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "${pulled}"
          expected_sha="$(cut -d' ' -f1 archive-evidence-bundle/*.tar.gz.sha256)"
          actual_sha="$(sha256sum "${pulled}" | cut -d' ' -f1)"
          if [ "${expected_sha}" != "${actual_sha}" ]; then
            echo "::error::Pulled OCI archive SHA-256 mismatch"
            exit 1
          fi

      - name: Upload OCI digest
        uses: actions/upload-artifact@v7
        with:
          name: archive-evidence-oci-digest
          path: archive-evidence-oci-digest.txt
          if-no-files-found: error
          retention-days: 30

  build-wheel:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry/git/target)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-build-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Install maturin
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin>=1.7,<2.0"

      - name: Build wheel with maturin
        run: maturin build --release --locked --bindings pyo3 --manifest-path crates/trackone-gateway/Cargo.toml --out target/wheels

      - name: Smoke test wheel import
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import glob
          import os
          import subprocess
          import sys
          import tempfile
          import textwrap

          wheels = sorted(glob.glob("target/wheels/trackone-*.whl"))
          if not wheels:
              raise SystemExit("No wheel found under target/wheels")

          preferred = next((w for w in wheels if "manylinux" in os.path.basename(w)), wheels[-1])
          wheel_name = os.path.basename(preferred)
          if "cp312-abi3" not in wheel_name:
              raise SystemExit(f"Expected cp312-abi3 wheel tag, got: {wheel_name}")

          print(f"Installing wheel: {preferred}")
          subprocess.check_call([sys.executable, "-m", "pip", "install", "--no-deps", preferred])

          tempdir = tempfile.mkdtemp(prefix="trackone-wheel-smoke-")
          snippet = textwrap.dedent(
              """
              from pathlib import Path
              import os
              import trackone_core
              import trackone_core._native as native

              source = (Path(os.environ["GITHUB_WORKSPACE"]) / "src" / "trackone_core").resolve()
              package_path = Path(trackone_core.__file__).resolve()
              native_path = Path(native.__file__).resolve()
              assert not package_path.is_relative_to(source), "trackone_core imported from checkout instead of wheel"
              assert not native_path.is_relative_to(source), "trackone_core._native imported from checkout instead of wheel"
              print("trackone_core", trackone_core.__version__, package_path)
              print("trackone_core._native", native.__version__, native_path)
              """
          )
          subprocess.check_call([sys.executable, "-c", snippet], cwd=tempdir)
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-py314
          path: target/wheels/*.whl
          if-no-files-found: error
          retention-days: 7

  test-wheel:
    runs-on: ubuntu-latest
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel-py314
          path: target/wheels

      - name: Ensure pip and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'tox>=4.0' 'tox-uv>=1.16.0'

      - name: Run tests against wheel via tox
        run: tox -e test-wheel-ci

  wheel-resolve:
    runs-on: ubuntu-latest
    needs: build-wheel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel-py314
          path: target/wheels

      - name: Ensure pip and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'tox>=4.0' 'tox-uv>=1.16.0'

      - name: Run pip resolve smoke test
        run: tox -e wheel-resolve
