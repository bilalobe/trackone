name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: List repo root
        run: |
          pwd
          ls -la
      - name: Show Makefile targets
        run: |
          grep -E '^[a-zA-Z0-9_.-]+:' Makefile || true
      - name: Run unit tests
        run: pytest -q

      - name: Dry-run
        run: make -n run | head -n 20

      - name: Run
        run: make run