name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo (registry/git/target)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt (check)
        run: cargo fmt --all --check

      - name: Cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Cargo test (workspace)
        run: cargo test --workspace --locked

  package-crates:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14 (for pyo3 packaging checks)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry/git/target)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo package (workspace)
        run: cargo package --workspace --locked

      - name: Upload crate packages
        uses: actions/upload-artifact@v7
        with:
          name: crates-packages
          path: target/package/*.crate
          if-no-files-found: error
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-${{ hashFiles('tox.ini') }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Ensure pip, wheel and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci]"

      - name: Run lint/type/readme tox envs
        run: |
          tox -e lint,type,readme

      - name: Run security tox env (non-blocking)
        run: |
          tox -e security || true

  test:
    runs-on: ubuntu-latest
    needs: [lint, rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.12'
            toxenv: py312
          - python-version: '3.13'
            toxenv: py313
          - python-version: '3.14'
            toxenv: py314
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-${{ matrix.toxenv }}-${{ hashFiles('tox.ini') }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Ensure pip, wheel and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci]"

      - name: Run tests via tox
        run: |
          tox -e ${{ matrix.toxenv }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.toxenv }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7

  pipeline:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-pipeline-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-pipeline-${{ hashFiles('tox.ini') }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Ensure pip, wheel and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci]"

      - name: Run pipeline via tox
        run: tox -e pipeline -- --keep-existing

  build-wheel:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache cargo (registry/git/target)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-build-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Install maturin
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin>=1.7,<2.0"

      - name: Build wheel with maturin
        run: maturin build --release --locked --bindings pyo3 --manifest-path crates/trackone-gateway/Cargo.toml --out target/wheels

      - name: Smoke test wheel import
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import glob
          import os
          import subprocess
          import sys

          wheels = sorted(glob.glob("target/wheels/trackone-*.whl"))
          if not wheels:
              raise SystemExit("No wheel found under target/wheels")

          preferred = next((w for w in wheels if "manylinux" in os.path.basename(w)), wheels[-1])
          print(f"Installing wheel: {preferred}")
          subprocess.check_call([sys.executable, "-m", "pip", "install", preferred])
          PY
          python -c "import trackone_core; print('trackone_core', trackone_core.__version__)"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-py314
          path: target/wheels/*.whl
          if-no-files-found: error
          retention-days: 7

  test-wheel:
    runs-on: ubuntu-latest
    needs: build-wheel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel-py314
          path: target/wheels

      - name: Ensure pip and tox (+ tox-uv)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[ci]"

      - name: Run tests against wheel via tox
        run: tox -e test-wheel
