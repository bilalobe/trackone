name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime + linting tools
        run: |
          # Ensure runtime packages (from requirements.txt) are available for type-checkers
          uv pip install --system -r requirements.txt
          # Then install developer tools (linters, mypy, pytest, etc.)
          uv pip install --system -r requirements-dev.txt

      - name: Run ruff (linter)
        run: ruff check scripts/ --output-format=github

      - name: Run black (formatter check)
        run: black --check scripts/

      - name: Run mypy (type-check)
        run: mypy --install-types --non-interactive scripts

      - name: Run bandit (security scan on runtime code)
        run: |
          # Use config to exclude tests/dev; scan the entire scripts/ tree
          bandit -r scripts -c .bandit.yaml

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.12', '3.13' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime + test deps
        run: |
          # Runtime requirements (pynacl, jsonschema, etc.)
          uv pip install --system -r requirements.txt
          # Test/runtime helpers (pytest, coverage, etc.)
          uv pip install --system -r requirements-dev.txt

      - name: Run tests with coverage (parallel)
        run: |
          pytest -n auto --cov=scripts --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
