name: Weekly Ratchet

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  ratchet:
    runs-on: ubuntu-latest
    env:
      OTS_CALENDARS: https://a.pool.opentimestamps.org,https://b.pool.opentimestamps.org
      OTS_STATIONARY_STUB: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache pip and uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-weekly-${{ hashFiles('**/requirements*.txt') }}-${{ hashFiles('pyproject.toml') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v4
        with:
          path: .tox
          key: ${{ runner.os }}-tox-weekly-${{ hashFiles('tox.ini') }}-${{ hashFiles('**/requirements*.txt') }}-${{ hashFiles('pyproject.toml') }}

      - name: Install tox and OTS client
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade tox opentimestamps-client

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build stationary calendar image
        run: docker build -t ots/calendar:latest docker/calendar

      - name: Verify OTS calendar config
        run: |
          python - <<'PY'
          import os, sys

          calendars = [c.strip() for c in os.environ.get('OTS_CALENDARS', '').split(',') if c.strip()]
          required = {
              'https://a.pool.opentimestamps.org',
              'https://b.pool.opentimestamps.org',
          }
          missing = sorted(required - set(calendars))
          if missing:
              raise SystemExit(f"Missing expected calendar endpoints: {missing}")

          if os.environ.get('OTS_STATIONARY_STUB') != '0':
              raise SystemExit('OTS_STATIONARY_STUB must remain disabled for ratchet runs')
          PY

      - name: Run tox -e ots-cal
        id: run_ots_cal
        env:
          CI: 'true'
        run: tox -e ots-cal

      - name: Run tox -e ots (real calendars)
        id: run_ots
        env:
          CI: 'true'
          RUN_REAL_OTS: '1'
        run: tox -e ots

      - name: Enforce real OTS coverage
        run: |
          set -uo pipefail
          shopt -s nullglob
          logs=(.tox/ots/log/*.log)
          if [ ${#logs[@]} -eq 0 ]; then
            echo '::error::No tox logs found for ots env; cannot verify RUN_REAL_OTS coverage.'
            exit 1
          fi
          if grep -F "Set RUN_REAL_OTS=1 to enable real OTS integration tests" "${logs[@]}" >/dev/null; then
            echo '::error::Real OTS tests were skipped despite RUN_REAL_OTS enforcement.'
            exit 1
          fi
          echo 'Verified ots env executed real calendar paths.'

      - name: Run tox -e slow (real calendars)
        id: run_slow
        env:
          CI: 'true'
          RUN_REAL_OTS: '1'
        run: tox -e slow

      - name: Enforce slow env real coverage
        run: |
          set -uo pipefail
          shopt -s nullglob
          logs=(.tox/slow/log/*.log)
          if [ ${#logs[@]} -eq 0 ]; then
            echo '::error::No tox logs found for slow env; cannot verify RUN_REAL_OTS coverage.'
            exit 1
          fi
          if grep -F "Set RUN_REAL_OTS=1 to enable real OTS integration tests" "${logs[@]}" >/dev/null; then
            echo '::error::Slow env skipped RUN_REAL_OTS-marked tests.'
            exit 1
          fi
          echo 'Verified slow env exercised real calendar paths.'

      - name: Generate ratchet metadata
        id: ratchet_meta
        env:
          OTS_CAL_OUTCOME: ${{ steps.run_ots_cal.outcome }}
          OTS_OUTCOME: ${{ steps.run_ots.outcome }}
          SLOW_OUTCOME: ${{ steps.run_slow.outcome }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import pathlib
          import subprocess

          repo_sha = os.environ['GITHUB_SHA']
          commit_msg = subprocess.check_output(
              ['git', 'show', '-s', '--format=%s', repo_sha], text=True
          ).strip()

          metadata = {
              'timestamp_utc': dt.datetime.now(dt.timezone.utc).isoformat(),
              'run': {
                  'id': os.environ['GITHUB_RUN_ID'],
                  'number': os.environ['GITHUB_RUN_NUMBER'],
                  'attempt': os.environ.get('GITHUB_RUN_ATTEMPT', ''),
                  'event': os.environ['GITHUB_EVENT_NAME'],
                  'workflow': os.environ['GITHUB_WORKFLOW'],
                  'url': f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              },
              'commit': {
                  'sha': repo_sha,
                  'message': commit_msg,
                  'ref': os.environ.get('GITHUB_REF', ''),
              },
              'tests': [
                  {'tox_env': 'ots-cal', 'outcome': os.environ.get('OTS_CAL_OUTCOME', 'unknown')},
                  {'tox_env': 'ots', 'outcome': os.environ.get('OTS_OUTCOME', 'unknown')},
                  {'tox_env': 'slow', 'outcome': os.environ.get('SLOW_OUTCOME', 'unknown')},
              ],
              'env': {
                  'OTS_CALENDARS': os.environ.get('OTS_CALENDARS', ''),
                  'OTS_STATIONARY_STUB': os.environ.get('OTS_STATIONARY_STUB', ''),
                  'RUN_REAL_OTS': '1',
              },
          }

          out_dir = pathlib.Path('out/ratchet')
          out_dir.mkdir(parents=True, exist_ok=True)
          target = out_dir / 'ratchet.json'
          target.write_text(json.dumps(metadata, indent=2) + '\n', encoding='utf-8')
          print(f'Wrote metadata to {target}')
          PY

      - name: Upload ratchet metadata
        uses: actions/upload-artifact@v4
        with:
          name: ratchet-metadata-${{ github.run_id }}
          path: out/ratchet/ratchet.json
          if-no-files-found: error
          retention-days: 14

      - name: Compute ratchet tag
        id: compute_tag
        if: github.ref == 'refs/heads/main'
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess

          pattern = re.compile(r'^v0\.0\.1\+(\d+)-m5$')
          existing = subprocess.check_output(
              ['git', 'tag', '--list', 'v0.0.1+*-m5'], text=True
          ).strip().splitlines()
          numbers = [int(pattern.match(tag).group(1)) for tag in existing if pattern.match(tag)]
          next_n = (max(numbers) + 1) if numbers else 1
          new_tag = f'v0.0.1+{next_n}-m5'
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'tag={new_tag}\n')
          print(f'Next ratchet tag: {new_tag}')
          PY

      - name: Annotate ratchet tag
        if: github.ref == 'refs/heads/main'
        env:
          TAG: ${{ steps.compute_tag.outputs.tag }}
        run: |
          git config user.name 'trackone-bot'
          git config user.email 'trackone-bot@users.noreply.github.com'
          git tag -a "$TAG" -m "Weekly ratchet ${GITHUB_RUN_ID} (tests: ots-cal, ots, slow)"
          git push origin "$TAG"
