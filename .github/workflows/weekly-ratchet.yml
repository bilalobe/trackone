name: Weekly Ratchet

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  actions: read
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ots-calendar

jobs:
  ratchet:
    runs-on: ubuntu-latest
    env:
      OTS_CALENDARS: https://a.pool.opentimestamps.org,https://b.pool.opentimestamps.org
      OTS_STATIONARY_STUB: '0'
      STRICT_REAL_OTS: ${{ github.ref_name == 'main' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Initialize job summary
        run: |
          {
            echo "# Weekly Ratchet"
            echo
            echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- SHA: \`${GITHUB_SHA}\`"
            echo "- STRICT_REAL_OTS: \`${STRICT_REAL_OTS:-0}\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache pip and uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pipuv-weekly-${{ hashFiles('**/requirements*.txt') }}-${{ hashFiles('pyproject.toml') }}

      - name: Cache tox virtualenvs
        uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-weekly-${{ hashFiles('tox.ini') }}-${{ hashFiles('**/requirements*.txt') }}-${{ hashFiles('pyproject.toml') }}

      - name: Install tox and OTS client
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade tox opentimestamps-client

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push stationary calendar image
        id: build_calendar
        uses: docker/build-push-action@v6
        with:
          context: docker/calendar
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Attest calendar image provenance
        if: github.repository_owner_type == 'Organization' || github.event.repository.private == false
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build_calendar.outputs.digest }}
          push-to-registry: true

      - name: Start local OTS calendar (for deterministic real-OTS)
        id: start_calendar
        run: |
          set -uo pipefail
          cid=$(docker run -d -p 8468:8468 --name trackone_ots_calendar ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }})
          echo "cid=$cid" >> "$GITHUB_OUTPUT"
          {
            echo "## Local calendar"
            echo "- Container: \`$cid\`"
            echo "- URL: http://127.0.0.1:8468"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for local calendar to be ready
        run: |
          set -uo pipefail
          cid="${{ steps.start_calendar.outputs.cid }}"
          echo "Waiting for local calendar (container ${cid:-unknown}) on http://127.0.0.1:8468"
          tries=0
          until curl -fsS -o /dev/null http://127.0.0.1:8468/ || [ $tries -ge 30 ]; do
            tries=$((tries+1))
            sleep 2
          done
          if [ $tries -ge 30 ]; then
            echo '::error::Local OTS calendar did not become ready in time.'
            if [ -n "${cid:-}" ]; then
              docker logs "$cid" || true
              docker stop "$cid" || true
            fi
            exit 1
          fi
          echo 'Local OTS calendar ready.'

      - name: Verify OTS calendar config
        run: |
          python - <<'PY'
          import os

          # Prepend local calendar so local scheduler is preferred in tests
          local = 'http://127.0.0.1:8468'
          env_cal = os.environ.get('OTS_CALENDARS', '')
          # ensure uniqueness and local first
          parts = [p.strip() for p in ([local] + env_cal.split(',')) if p.strip()]
          seen = []
          uniq = []
          for p in parts:
              if p not in seen:
                  seen.append(p)
                  uniq.append(p)
          updated = ','.join(uniq)

          calendars = [c.strip() for c in updated.split(',') if c.strip()]
          required = {
              'https://a.pool.opentimestamps.org',
              'https://b.pool.opentimestamps.org',
          }
          missing = sorted(required - set(calendars))
          if missing:
              raise SystemExit(f"Missing expected calendar endpoints: {missing}")

          if os.environ.get('OTS_STATIONARY_STUB') != '0':
              raise SystemExit('OTS_STATIONARY_STUB must remain disabled for ratchet runs')

          # IMPORTANT: persist for downstream steps via GITHUB_ENV
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"OTS_CALENDARS={updated}\n")

          print(f"Updated OTS_CALENDARS={updated}")
          PY

      - name: Run tox -e ots-cal
        id: run_ots_cal
        env:
          CI: 'true'
          # prefer local calendar first
          OTS_CALENDARS: ${{ env.OTS_CALENDARS }}
          OTS_STATIONARY_STUB: '0'
        run: |
          tox -e ots-cal
          {
            echo "## Tox runs"
            echo "- ots-cal: ✅"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run tox -e ots (real calendars)
        id: run_ots
        env:
          CI: 'true'
          RUN_REAL_OTS: '1'
          # prefer local calendar first
          OTS_CALENDARS: ${{ env.OTS_CALENDARS }}
          OTS_STATIONARY_STUB: '0'
        run: |
          tox -e ots
          {
            echo "## Tox runs"
            echo "- ots: ✅"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce real OTS coverage
        run: |
          set -uo pipefail
          shopt -s nullglob
          logs=(.tox/ots/log/*.log)
          if [ ${#logs[@]} -eq 0 ]; then
            echo '::error::No tox logs found for ots env; cannot verify RUN_REAL_OTS coverage.'
            exit 1
          fi

          if grep -E 'collected .* / 0 selected' "${logs[@]}" >/dev/null; then
            echo '::error::Pytest deselected all real_ots tests (0 selected). Check markers and -m usage.'
            [ "${STRICT_REAL_OTS:-0}" = "1" ] && exit 1 || echo '::warning::Continuing because STRICT_REAL_OTS!=1'
          fi

          # Guard against classic RUN_REAL_OTS gating skip reason
          if grep -F "Set RUN_REAL_OTS=1 to enable real OTS integration tests" "${logs[@]}" >/dev/null; then
            echo '::error::Real OTS tests were skipped due to RUN_REAL_OTS gating.'
            [ "${STRICT_REAL_OTS:-0}" = "1" ] && exit 1 || echo '::warning::Continuing because STRICT_REAL_OTS!=1'
          fi

          # Guard against missing ots binary skip reason
          if grep -F "'ots' binary not found on PATH" "${logs[@]}" >/dev/null; then
            echo "::error::Real OTS tests were skipped because no 'ots' binary was found on PATH. Ensure opentimestamps-client is installed and available."
            [ "${STRICT_REAL_OTS:-0}" = "1" ] && exit 1 || echo '::warning::Continuing because STRICT_REAL_OTS!=1'
          fi

          # Detect incomplete public timestamping and fail when strict
          if grep -F "Failed! Timestamp not complete" "${logs[@]}" >/dev/null; then
            echo '::error::One or more real OTS runs reported incomplete timestamps.'
            [ "${STRICT_REAL_OTS:-0}" = "1" ] && exit 1 || echo '::warning::Continuing because STRICT_REAL_OTS!=1'
          fi

          echo 'Verified ots env executed real calendar paths.'
          {
            echo "## Coverage checks"
            echo "- ots env real-OTS gating: ✅"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run tox -e slow (real calendars)
        id: run_slow
        env:
          CI: 'true'
          RUN_REAL_OTS: '1'
          OTS_CALENDARS: ${{ env.OTS_CALENDARS }}
          OTS_STATIONARY_STUB: '0'
        run: |
          tox -e slow
          {
            echo "- slow: ✅"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce slow env real coverage
        run: |
          set -uo pipefail
          shopt -s nullglob
          logs=(.tox/slow/log/*.log)
          if [ ${#logs[@]} -eq 0 ]; then
            echo '::error::No tox logs found for slow env; cannot verify RUN_REAL_OTS coverage.'
            exit 1
          fi

          # IMPORTANT: match pytest's "collected X / 0 selected" format to avoid false positives from "40 selected"
          if grep -E 'collected .* / 0 selected' "${logs[@]}" >/dev/null; then
            echo '::error::Pytest deselected all real_ots tests in slow env (0 selected).'
            [ "${STRICT_REAL_OTS:-0}" = "1" ] && exit 1 || echo '::warning::Continuing because STRICT_REAL_OTS!=1'
          fi

          if grep -F "Set RUN_REAL_OTS=1 to enable real OTS integration tests" "${logs[@]}" >/dev/null; then
            echo '::error::Slow env skipped RUN_REAL_OTS-marked tests.'
            [ "${STRICT_REAL_OTS:-0}" = "1" ] && exit 1 || echo '::warning::Continuing because STRICT_REAL_OTS!=1'
          fi

          if grep -F "'ots' binary not found on PATH" "${logs[@]}" >/dev/null; then
            echo "::error::Slow env skipped due to missing 'ots' binary on PATH."
            [ "${STRICT_REAL_OTS:-0}" = "1" ] && exit 1 || echo '::warning::Continuing because STRICT_REAL_OTS!=1'
          fi

          if grep -F "Failed! Timestamp not complete" "${logs[@]}" >/dev/null; then
            echo '::error::One or more slow env real OTS runs reported incomplete timestamps.'
            [ "${STRICT_REAL_OTS:-0}" = "1" ] && exit 1 || echo '::warning::Continuing because STRICT_REAL_OTS!=1'
          fi

          echo 'Verified slow env exercised real calendar paths.'
          {
            echo "- slow env real-OTS gating: ✅"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop local OTS calendar
        if: always()
        run: |
          set -uo pipefail
          if docker ps -q --filter "name=trackone_ots_calendar" | grep -q .; then
            docker stop trackone_ots_calendar || true
            docker rm -f trackone_ots_calendar || true
          fi

      - name: Generate ratchet metadata
        id: ratchet_meta
        env:
          OTS_CAL_OUTCOME: ${{ steps.run_ots_cal.outcome }}
          OTS_OUTCOME: ${{ steps.run_ots.outcome }}
          SLOW_OUTCOME: ${{ steps.run_slow.outcome }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import pathlib
          import subprocess

          repo_sha = os.environ['GITHUB_SHA']
          commit_msg = subprocess.check_output(
              ['git', 'show', '-s', '--format=%s', repo_sha], text=True
          ).strip()

          metadata = {
              'timestamp_utc': dt.datetime.now(dt.timezone.utc).isoformat(),
              'run': {
                  'id': os.environ['GITHUB_RUN_ID'],
                  'number': os.environ['GITHUB_RUN_NUMBER'],
                  'attempt': os.environ.get('GITHUB_RUN_ATTEMPT', ''),
                  'event': os.environ['GITHUB_EVENT_NAME'],
                  'workflow': os.environ['GITHUB_WORKFLOW'],
                  'url': f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              },
              'commit': {
                  'sha': repo_sha,
                  'message': commit_msg,
                  'ref': os.environ.get('GITHUB_REF', ''),
              },
              'tests': [
                  {'tox_env': 'ots-cal', 'outcome': os.environ.get('OTS_CAL_OUTCOME', 'unknown')},
                  {'tox_env': 'ots', 'outcome': os.environ.get('OTS_OUTCOME', 'unknown')},
                  {'tox_env': 'slow', 'outcome': os.environ.get('SLOW_OUTCOME', 'unknown')},
              ],
              'env': {
                  'OTS_CALENDARS': os.environ.get('OTS_CALENDARS', ''),
                  'OTS_STATIONARY_STUB': os.environ.get('OTS_STATIONARY_STUB', ''),
                  'RUN_REAL_OTS': '1',
              },
          }

          out_dir = pathlib.Path('out/ratchet')
          out_dir.mkdir(parents=True, exist_ok=True)
          target = out_dir / 'ratchet.json'
          target.write_text(json.dumps(metadata, indent=2) + '\n', encoding='utf-8')
          print(f'Wrote metadata to {target}')
          PY

      - name: Upload ratchet metadata
        uses: actions/upload-artifact@v6
        with:
          name: ratchet-metadata-${{ github.run_id }}
          path: out/ratchet/ratchet.json
          if-no-files-found: error
          retention-days: 14

      - name: Compute ratchet tag
        id: compute_tag
        if: github.ref == 'refs/heads/main'
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess

          pattern = re.compile(r'^v0\.0\.1\+(\d+)-m5$')
          existing = subprocess.check_output(
              ['git', 'tag', '--list', 'v0.0.1+*-m5'], text=True
          ).strip().splitlines()
          numbers = [int(pattern.match(tag).group(1)) for tag in existing if pattern.match(tag)]
          next_n = (max(numbers) + 1) if numbers else 1
          new_tag = f'v0.0.1+{next_n}-m5'
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'tag={new_tag}\n')
          print(f'Next ratchet tag: {new_tag}')

          # Add to summary
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as fh:
              fh.write(f'\n## Tagging\n- Computed next tag: `{new_tag}`\n\n')
          PY

      - name: Annotate ratchet tag
        if: github.ref == 'refs/heads/main'
        env:
          TAG: ${{ steps.compute_tag.outputs.tag }}
        run: |
          git config user.name 'trackone-bot'
          git config user.email 'trackone-bot@users.noreply.github.com'
          git tag -a "$TAG" -m "Weekly ratchet ${GITHUB_RUN_ID} (tests: ots-cal, ots, slow)"
          git push origin "$TAG"
          {
            echo "- Pushed: \`$TAG\` ✅"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
