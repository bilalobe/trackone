name: Release

on:
  push:
    tags: [ 'v*' ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-helm:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart for release tag
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/trackone \
            --version "${version}" \
            --app-version "${version}" \
            --destination dist

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "${GHCR_TOKEN}" | helm registry login ghcr.io \
            --username "${owner}" \
            --password-stdin

      - name: Push OCI chart artifact
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          helm push "dist/trackone-${version}.tgz" "oci://ghcr.io/${owner}/trackone/charts"

  publish-crates:
    runs-on: ubuntu-latest
    needs: ci
    environment: crates-io
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14 (for pyo3 build)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry/git/target)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Publish crates (topological order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crates=(
            trackone-constants
            trackone-core
            trackone-ledger
            trackone-pod-fw
            trackone-gateway
          )

          for crate in "${crates[@]}"; do
            echo "::group::Publishing ${crate}"
            set +e
            cargo publish -p "${crate}" --locked 2>&1 | tee /tmp/publish-out.txt
            rc=${PIPESTATUS[0]}
            set -e

            if [ "$rc" -ne 0 ]; then
              if grep -qi "already exists" /tmp/publish-out.txt; then
                echo "Skipping ${crate}; already published."
              else
                echo "Failed to publish ${crate} (exit ${rc})."
                exit "$rc"
              fi
            else
              echo "Published ${crate}."
            fi
            echo "::endgroup::"
          done

  publish-wheel:
    runs-on: ubuntu-latest
    needs: [ci, publish-crates]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel-py314
          path: dist/

      - name: Keep only publishable wheel artifacts
        run: |
          shopt -s nullglob
          wheels=(dist/trackone-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No wheels found under dist/"
            exit 1
          fi

          for wheel in "${wheels[@]}"; do
            case "$wheel" in
              *manylinux*.whl) ;;
              *)
                rm -f "$wheel" "$wheel.publish.attestation"
                ;;
            esac
          done

          remaining=(dist/trackone-*.whl)
          if [ ${#remaining[@]} -eq 0 ]; then
            echo "No publishable manylinux wheel remains under dist/"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
