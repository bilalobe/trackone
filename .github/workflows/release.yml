name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the complete tag object
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate annotated tag and release versions
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          test "${GITHUB_REF_NAME}" = "v${version}"
          test "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")" = tag
          test "$(git rev-parse "refs/tags/${GITHUB_REF_NAME}^{commit}")" = "${GITHUB_SHA}"
          grep -Fq "pub const VERSION: &str = \"${version}\";" crates/trackone-core/src/lib.rs
          grep -Fq "version: ${version}" apps/trackone-gateway-svc/deploy/helm/trackone/Chart.yaml
          grep -Fq "appVersion: \"${version}\"" apps/trackone-gateway-svc/deploy/helm/trackone/Chart.yaml

  ci:
    needs: preflight
    uses: ./.github/workflows/ci.yml
    permissions:
      attestations: write
      contents: read
      id-token: write
    with:
      archive_subject_kind: release
      archive_subject: ${{ github.ref_name }}
      archive_carrier: ghcr.io/${{ github.repository }}/conformance-archive:${{ github.ref_name }}

  publish-gateway-image:
    runs-on: ubuntu-latest
    needs: [preflight, ci]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image
        run: echo "version=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Build and publish the draft-08 gateway
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/trackone-gateway-svc/deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/gateway:${{ steps.image.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

  publish-crates:
    runs-on: ubuntu-latest
    needs: [preflight, ci]
    environment: crates-io
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crates=(
            trackone-constants
            trackone-ledger
            trackone-core
            trackone-ingest
            trackone-ots
            trackone-sensorthings
            trackone-pod-fw
            trackone-gateway-svc
            trackone-evidence
          )
          mkdir -p publication
          : > publication/crates.txt
          for crate in "${crates[@]}"; do
            rc=0
            for attempt in 1 2 3; do
              set +e
              cargo publish -p "${crate}" --locked 2>&1 | tee /tmp/publish-out.txt
              rc=${PIPESTATUS[0]}
              set -e
              if [ "${rc}" -eq 0 ] || grep -qi "already exists" /tmp/publish-out.txt; then
                break
              fi
              if grep -qi "no matching package named" /tmp/publish-out.txt && [ "${attempt}" -lt 3 ]; then
                sleep 20
                continue
              fi
              break
            done
            if [ "${rc}" -ne 0 ] && ! grep -qi "already exists" /tmp/publish-out.txt; then
              exit "${rc}"
            fi
            printf '%s %s\n' "${crate}" "${GITHUB_REF_NAME#v}" >> publication/crates.txt
          done

      - name: Upload crate publication record
        uses: actions/upload-artifact@v7
        with:
          name: crates-publication-record
          path: publication/crates.txt
          if-no-files-found: error
          retention-days: 30

  publish-helm:
    runs-on: ubuntu-latest
    needs: [preflight, ci]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download the CI-validated chart
        uses: actions/download-artifact@v8
        with:
          name: helm-chart
          path: dist

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          echo "${GHCR_TOKEN}" |
          helm registry login ghcr.io
          --username "${GITHUB_REPOSITORY_OWNER,,}"
          --password-stdin

      - name: Push the exact validated chart
        run: |
          set -euo pipefail
          shopt -s nullglob
          charts=(dist/*.tgz)
          test "${#charts[@]}" -eq 1
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          helm push "${charts[0]}" "oci://ghcr.io/${owner}/trackone/charts" | tee helm-push.txt
          sha256sum "${charts[0]}" > helm-chart.sha256
          grep '^Digest:' helm-push.txt | sed 's/^Digest:[[:space:]]*//' > helm-oci-digest.txt
          test -s helm-oci-digest.txt

      - name: Upload Helm publication record
        uses: actions/upload-artifact@v7
        with:
          name: helm-publication-record
          path: |
            helm-chart.sha256
            helm-oci-digest.txt
          if-no-files-found: error
          retention-days: 30

  publish-conformance-archive:
    runs-on: ubuntu-latest
    needs: [publish-crates, publish-helm]
    permissions:
      contents: read
      packages: write
    env:
      ARCHIVE_OCI_REF: ghcr.io/${{ github.repository }}/conformance-archive:${{ github.ref_name }}
    steps:
      - name: Download the CI-built release archive
        uses: actions/download-artifact@v8
        with:
          name: conformance-archive
          path: handoff

      - name: Validate the release archive handoff
        id: handoff
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(handoff/*.tar.gz)
          test "${#archives[@]}" -eq 1
          archive="${archives[0]}"
          expected="$(cut -d' ' -f1 "${archive}.sha256")"
          actual="$(sha256sum "${archive}" | cut -d' ' -f1)"
          test "${expected}" = "${actual}"
          python3 - "${archive}.manifest.json" "${GITHUB_REF_NAME}" "${GITHUB_SHA}" <<'PY'
          import json
          import sys

          manifest = json.load(open(sys.argv[1], encoding="utf-8"))
          assert manifest["subject"] == {
              "kind": "release",
              "name": sys.argv[2],
              "git_commit": sys.argv[3],
          }
          assert manifest["carrier"]["oci_ref"] == (
              f"ghcr.io/{__import__('os').environ['GITHUB_REPOSITORY']}/"
              f"conformance-archive:{sys.argv[2]}"
          )
          PY
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
          echo "archive_name=$(basename "${archive}")" >> "${GITHUB_OUTPUT}"
          echo "archive_sha256=${actual}" >> "${GITHUB_OUTPUT}"

      - name: Set up ORAS
        uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          echo "${GHCR_TOKEN}" |
          oras login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Publish the immutable release archive
        env:
          ARCHIVE: ${{ steps.handoff.outputs.archive }}
          ARCHIVE_NAME: ${{ steps.handoff.outputs.archive_name }}
          ARCHIVE_SHA256: ${{ steps.handoff.outputs.archive_sha256 }}
        run: |
          set -euo pipefail
          find_archive() {
            local directory="$1"
            local matches
            mapfile -t matches < <(find "${directory}" -type f -name "${ARCHIVE_NAME}" -print)
            test "${#matches[@]}" -eq 1
            printf '%s\n' "${matches[0]}"
          }
          if oras resolve "${ARCHIVE_OCI_REF}" > existing-oci-digest.txt 2>/dev/null; then
            mkdir -p existing
            oras pull --output existing "${ARCHIVE_OCI_REF}"
            existing_archive="$(find_archive existing)"
            existing_sha="$(sha256sum "${existing_archive}" | cut -d' ' -f1)"
            if [ "${existing_sha}" != "${ARCHIVE_SHA256}" ]; then
              echo "::error::Release OCI tag already points at different archive bytes"
              exit 1
            fi
          else
            oras push "${ARCHIVE_OCI_REF}" \
              --artifact-type application/vnd.trackone.conformance.archive.v3+tar \
              --annotation org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
              --annotation org.opencontainers.image.revision="${GITHUB_SHA}" \
              --annotation org.opencontainers.image.version="${GITHUB_REF_NAME}" \
              --annotation org.opencontainers.image.title="TrackOne release conformance archive v3" \
              "${ARCHIVE}:application/gzip"
          fi
          oras resolve "${ARCHIVE_OCI_REF}" | tee conformance-oci-digest.txt

      - name: Pull back and verify outside the source checkout
        env:
          ARCHIVE_NAME: ${{ steps.handoff.outputs.archive_name }}
          ARCHIVE_SHA256: ${{ steps.handoff.outputs.archive_sha256 }}
        run: |
          set -euo pipefail
          find_archive() {
            local directory="$1"
            local matches
            mapfile -t matches < <(find "${directory}" -type f -name "${ARCHIVE_NAME}" -print)
            test "${#matches[@]}" -eq 1
            printf '%s\n' "${matches[0]}"
          }
          mkdir -p pulled extracted
          oras pull --output pulled "${ARCHIVE_OCI_REF}"
          pulled_archive="$(find_archive pulled)"
          pulled_sha="$(sha256sum "${pulled_archive}" | cut -d' ' -f1)"
          test "${pulled_sha}" = "${ARCHIVE_SHA256}"
          tar -xzf "${pulled_archive}" -C extracted
          archive_root="$(find extracted -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "${archive_root}"
          verifier="$(realpath "${archive_root}/verifier/verify_conformance_archive.py")"
          root="$(realpath "${archive_root}")"
          cd "${RUNNER_TEMP}"
          env -u PYTHONPATH python3 "${verifier}" \
            --root "${root}" \
            --output "${GITHUB_WORKSPACE}/release-conformance-verification.json"

      - name: Upload release conformance records
        uses: actions/upload-artifact@v7
        with:
          name: release-conformance-record
          path: |
            conformance-oci-digest.txt
            release-conformance-verification.json
            handoff/*.sha256
            handoff/*.manifest.json
          if-no-files-found: error
          retention-days: 30

  publish-github-release:
    runs-on: ubuntu-latest
    needs: [publish-conformance-archive]
    permissions:
      contents: write
    steps:
      - name: Download durable release records
        uses: actions/download-artifact@v8
        with:
          pattern: '*-publication-record'
          path: records
          merge-multiple: true

      - name: Download conformance release records
        uses: actions/download-artifact@v8
        with:
          name: release-conformance-record
          path: records

      - name: Create or update the GitHub prerelease record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "TrackOne ${GITHUB_REF_NAME}" \
              --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "TrackOne ${GITHUB_REF_NAME}" \
              --generate-notes \
              --prerelease
          fi
          mapfile -t files < <(find records -type f -print | sort)
          test "${#files[@]}" -gt 0
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
