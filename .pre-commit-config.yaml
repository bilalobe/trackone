repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Helm templates contain Go templating directives (e.g. `{{- ... }}`) which
        # are not valid YAML until rendered, so exclude chart template manifests.
        exclude: ^deploy/helm/.*/templates/
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        # Let pre-commit decide which files changed; don't force repo-wide run here
        # (use `pre-commit run --all-files` explicitly in CI or developers' machines)
        # files: .  <-- removed to avoid repo-wide matching

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.13
    hooks:
      - id: ruff
        # Lint changed Python files only; keep autofix arg for local convenience
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        files: ^(README\.md|adr/.+\.md|docs/.+\.md)$
        additional_dependencies:
          - mdformat-gfm
          - mdformat-ruff

  - repo: local
    hooks:
      - id: check-prohibited-rngs
        name: check prohibited RNG APIs
        entry: python scripts/lint/check_prohibited_rngs.py
        language: system
        files: '\.py$'
        pass_filenames: true
      - id: scan-embedded-proofs
        name: scan for embedded OTS proofs in JSON
        entry: python scripts/lint/scan_embedded_proofs.py --quiet
        language: system
        files: '\.json$'
        pass_filenames: true
